---
- name: Validate Ansible staging deploy inputs
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Require deploy variables
      ansible.builtin.assert:
        that:
          - image_uri is defined
          - image_uri | length > 0
          - ecr_registry is defined
          - ecr_registry | length > 0
          - aws_region is defined
          - aws_region | length > 0
          - reconnect_ttl_seconds is defined
          - groups.gateway | default([]) | length == 1
          - groups.workers | default([]) | length >= 2
        fail_msg: "Missing required Ansible deploy inputs or staging inventory groups."

- name: Prepare staging EC2 hosts
  hosts: gateway:workers
  gather_facts: false
  any_errors_fatal: true
  roles:
    - common

- name: Prepare gateway Redis runtime
  hosts: gateway
  gather_facts: false
  any_errors_fatal: true
  roles:
    - gateway

- name: Prepare worker images and candidate containers
  hosts: workers
  gather_facts: false
  any_errors_fatal: true
  tasks:
    - name: Prepare worker candidate
      ansible.builtin.import_role:
        name: worker
        tasks_from: prepare_candidate

- name: Roll worker containers behind gateway
  hosts: workers
  gather_facts: false
  any_errors_fatal: true
  serial: 1
  vars:
    gateway_host: "{{ groups.gateway[0] }}"
    full_worker_private_ips: "{{ groups.workers | map('extract', hostvars, 'private_ip') | list }}"
  tasks:
    - name: Drain current worker from gateway upstream
      ansible.builtin.include_role:
        name: gateway
        tasks_from: configure_upstream
        apply:
          delegate_to: "{{ gateway_host }}"
      vars:
        active_worker_private_ips: "{{ groups.workers | difference([inventory_hostname]) | map('extract', hostvars, 'private_ip') | list }}"
      when: groups.workers | difference([inventory_hostname]) | length > 0

    - name: Wait briefly after gateway drain
      ansible.builtin.pause:
        seconds: 5
      when: groups.workers | difference([inventory_hostname]) | length > 0

    - name: Promote prepared worker candidate
      block:
        - name: Promote candidate
          ansible.builtin.import_role:
            name: worker
            tasks_from: promote_candidate
      rescue:
        - name: Restore full gateway upstream after worker failure
          ansible.builtin.include_role:
            name: gateway
            tasks_from: configure_upstream
            apply:
              delegate_to: "{{ gateway_host }}"
          vars:
            active_worker_private_ips: "{{ full_worker_private_ips }}"

        - name: Fail deploy after restoring gateway upstream
          ansible.builtin.fail:
            msg: "Worker {{ inventory_hostname }} update failed; full gateway upstream was restored."

- name: Restore final gateway upstream
  hosts: gateway
  gather_facts: false
  any_errors_fatal: true
  vars:
    active_worker_private_ips: "{{ groups.workers | map('extract', hostvars, 'private_ip') | list }}"
  tasks:
    - name: Restore all healthy workers in gateway upstream
      ansible.builtin.include_role:
        name: gateway
        tasks_from: configure_upstream
