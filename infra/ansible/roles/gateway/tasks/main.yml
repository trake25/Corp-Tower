---
- name: Ensure gateway Docker network
  ansible.builtin.shell: |
    set -euo pipefail
    if sudo docker network inspect corp-tower-gateway >/dev/null 2>&1; then
      echo exists
      exit 0
    fi

    timeout 30 sudo docker network create corp-tower-gateway
  args:
    executable: /bin/bash
  register: gateway_network_create
  changed_when: "'exists' not in gateway_network_create.stdout"

- name: Remove legacy gateway-local server container
  ansible.builtin.shell: |
    set -euo pipefail
    timeout 30 sudo docker stop corp-tower-server 2>/dev/null || true
    timeout 30 sudo docker rm corp-tower-server 2>/dev/null || true
  args:
    executable: /bin/bash
  changed_when: false

- name: Require DuckDNS token for gateway boot updater
  ansible.builtin.assert:
    that:
      - lookup('ansible.builtin.env', 'DUCKDNS_TOKEN') | length > 0
    fail_msg: "DUCKDNS_TOKEN must be provided as a GitHub staging environment secret."
  no_log: true

- name: Ensure Corp Tower config directory
  ansible.builtin.file:
    path: /etc/corp-tower
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true

- name: Install DuckDNS updater secret
  ansible.builtin.copy:
    dest: /etc/corp-tower/duckdns.env
    owner: root
    group: root
    mode: "0600"
    content: |
      DUCKDNS_DOMAIN={{ duckdns_domain | default('corp-tower') }}
      DUCKDNS_TOKEN={{ lookup('ansible.builtin.env', 'DUCKDNS_TOKEN') }}
  become: true
  no_log: true

- name: Install DuckDNS boot updater script
  ansible.builtin.copy:
    dest: /usr/local/bin/corp-tower-duckdns-update
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      source /etc/corp-tower/duckdns.env

      IMDS_TOKEN="$(
        curl -fsS \
          --connect-timeout 2 \
          --max-time 5 \
          -X PUT \
          -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" \
          "http://169.254.169.254/latest/api/token"
      )"

      PUBLIC_IP="$(
        curl -fsS \
          --connect-timeout 2 \
          --max-time 5 \
          -H "X-aws-ec2-metadata-token: ${IMDS_TOKEN}" \
          "http://169.254.169.254/latest/meta-data/public-ipv4"
      )"

      RESPONSE="$(
        curl -fsS \
          --connect-timeout 5 \
          --max-time 15 \
          --get "https://www.duckdns.org/update" \
          --data-urlencode "domains=${DUCKDNS_DOMAIN}" \
          --data-urlencode "token=${DUCKDNS_TOKEN}" \
          --data-urlencode "ip=${PUBLIC_IP}" \
          --data-urlencode "verbose=true"
      )"

      STATUS="$(printf '%s\n' "${RESPONSE}" | tr -d '\r' | sed -n '1p')"
      if [ "${STATUS}" != "OK" ]; then
        echo "DuckDNS update failed with status: ${STATUS}"
        exit 1
      fi

      echo "DuckDNS ${DUCKDNS_DOMAIN}.duckdns.org updated to ${PUBLIC_IP}."
  become: true

- name: Install DuckDNS boot updater service
  ansible.builtin.copy:
    dest: /etc/systemd/system/corp-tower-duckdns-update.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Update Corp Tower DuckDNS gateway record
      Wants=network-online.target
      After=network-online.target
      StartLimitIntervalSec=10min
      StartLimitBurst=10

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/corp-tower-duckdns-update
      Restart=on-failure
      RestartSec=30s

      [Install]
      WantedBy=multi-user.target
  become: true

- name: Enable and run DuckDNS boot updater
  ansible.builtin.shell: |
    set -euo pipefail
    sudo systemctl daemon-reload
    sudo systemctl enable corp-tower-duckdns-update.service
    sudo systemctl restart corp-tower-duckdns-update.service
  args:
    executable: /bin/bash
  changed_when: true

- name: Check Redis container health
  ansible.builtin.shell: |
    set -euo pipefail
    if sudo docker inspect corp-tower-redis >/dev/null 2>&1; then
      if timeout 10 sudo docker exec corp-tower-redis redis-cli ping | grep -q PONG; then
        echo ready
        exit 0
      fi

      timeout 30 sudo docker stop corp-tower-redis 2>/dev/null || true
      timeout 30 sudo docker rm corp-tower-redis 2>/dev/null || true
    fi

    echo missing
  args:
    executable: /bin/bash
  register: gateway_redis_health
  changed_when: "'missing' in gateway_redis_health.stdout"

- name: Pull Redis image when Redis is not ready
  ansible.builtin.command: timeout 180 sudo docker pull redis:7-alpine
  when: "'ready' not in gateway_redis_health.stdout"
  changed_when: true

- name: Start Redis container when Redis is not ready
  ansible.builtin.command: >
    timeout 60 sudo docker run -d
    --name corp-tower-redis
    --restart unless-stopped
    --network corp-tower-gateway
    -p 6379:6379
    redis:7-alpine redis-server --bind 0.0.0.0 --protected-mode no
  when: "'ready' not in gateway_redis_health.stdout"
  changed_when: true

- name: Wait for Redis readiness
  ansible.builtin.shell: |
    set -euo pipefail
    for attempt in $(seq 1 30); do
      if timeout 10 sudo docker exec corp-tower-redis redis-cli ping | grep -q PONG; then
        exit 0
      fi
      sleep 1
    done

    timeout 30 sudo docker logs corp-tower-redis
    exit 1
  args:
    executable: /bin/bash
  changed_when: false
