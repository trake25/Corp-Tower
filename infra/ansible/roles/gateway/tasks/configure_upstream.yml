---
- name: Require active worker upstream list
  ansible.builtin.assert:
    that:
      - active_worker_private_ips is defined
      - active_worker_private_ips | length > 0
    fail_msg: "No active workers remain for gateway upstream."

- name: Verify active worker reachability from gateway
  ansible.builtin.shell: |
    set -euo pipefail
    for attempt in $(seq 1 30); do
      if timeout 5 bash -c "cat < /dev/null > /dev/tcp/{{ item }}/3000"; then
        exit 0
      fi
      sleep 2
    done

    echo "Worker {{ item }}:3000 did not become reachable from gateway."
    exit 1
  args:
    executable: /bin/bash
  loop: "{{ active_worker_private_ips }}"
  changed_when: false

- name: Render gateway Caddyfile
  ansible.builtin.template:
    src: corp-tower-caddy.Caddyfile.j2
    dest: /tmp/corp-tower-caddy.Caddyfile
    mode: "0644"

- name: Ensure Caddy persistent directories
  ansible.builtin.command: sudo mkdir -p /var/lib/corp-tower-caddy/data /var/lib/corp-tower-caddy/config
  changed_when: false

- name: Pull Caddy image for validation and gateway runtime
  ansible.builtin.command: timeout 180 sudo docker pull caddy:2-alpine
  changed_when: false

- name: Validate rendered Caddyfile
  ansible.builtin.command: >
    sudo docker run --rm
    --network host
    -v /tmp/corp-tower-caddy.Caddyfile:/etc/caddy/Caddyfile:ro
    -v /var/lib/corp-tower-caddy/data:/data
    -v /var/lib/corp-tower-caddy/config:/config
    caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
  changed_when: false

- name: Reload or start gateway Caddy container
  ansible.builtin.shell: |
    set -euo pipefail
    GATEWAY_STATUS="$(sudo docker inspect -f '{% raw %}{{.State.Status}}{% endraw %}' corp-tower-gateway 2>/dev/null || true)"
    GATEWAY_IMAGE="$(sudo docker inspect -f '{% raw %}{{.Config.Image}}{% endraw %}' corp-tower-gateway 2>/dev/null || true)"

    if [ "$GATEWAY_STATUS" = "running" ] && [[ "$GATEWAY_IMAGE" == caddy:* ]]; then
      sudo docker exec corp-tower-gateway caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
      sudo docker exec corp-tower-gateway caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile
    else
      sudo docker rm -f corp-tower-gateway 2>/dev/null || true

      for port in 80 443; do
        if sudo ss -ltnp | grep -q ":${port} "; then
          echo "Port ${port} is already listening before gateway start:"
          sudo ss -ltnp | grep ":${port} " || true
          exit 1
        fi
      done

      sudo docker run -d \
        --name corp-tower-gateway \
        --restart unless-stopped \
        --network host \
        -v /tmp/corp-tower-caddy.Caddyfile:/etc/caddy/Caddyfile:ro \
        -v /var/lib/corp-tower-caddy/data:/data \
        -v /var/lib/corp-tower-caddy/config:/config \
        caddy:2-alpine
    fi

    sudo ss -ltnp | grep -E ':(80|443) ' || true
    sudo docker ps --filter name=corp-tower
  args:
    executable: /bin/bash
  changed_when: true
