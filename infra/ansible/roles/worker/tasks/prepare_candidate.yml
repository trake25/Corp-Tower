---
- name: Prepare candidate server container on worker
  ansible.builtin.shell: |
    set -euo pipefail
    IMAGE_URI='{{ image_uri }}'
    REDIS_URL='{{ redis_url }}'
    ECR_REGISTRY='{{ ecr_registry }}'
    AWS_REGION='{{ aws_region }}'
    RECONNECT_TTL_SECONDS='{{ reconnect_ttl_seconds }}'

    sudo docker rm -f corp-tower-server-next 2>/dev/null || true

    aws ecr get-login-password --region "$AWS_REGION" \
      | sudo docker login --username AWS --password-stdin "$ECR_REGISTRY"

    timeout 180 sudo docker pull "$IMAGE_URI"

    CURRENT_IMAGE="$(sudo docker inspect -f '{% raw %}{{.Config.Image}}{% endraw %}' corp-tower-server 2>/dev/null || true)"
    CURRENT_STATUS="$(sudo docker inspect -f '{% raw %}{{.State.Status}}{% endraw %}' corp-tower-server 2>/dev/null || true)"
    CURRENT_HEALTH="$(sudo docker inspect -f '{% raw %}{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}{% endraw %}' corp-tower-server 2>/dev/null || true)"

    {
      echo "current_image=${CURRENT_IMAGE}"
      echo "current_status=${CURRENT_STATUS}"
      echo "current_health=${CURRENT_HEALTH}"
    } > /tmp/corp-tower-worker-current.env

    if [ "$CURRENT_IMAGE" = "$IMAGE_URI" ] && { [ "$CURRENT_HEALTH" = "healthy" ] || [ "$CURRENT_STATUS" = "running" ]; }; then
      echo "already_current=true" >> /tmp/corp-tower-worker-current.env
      sudo docker ps --filter name=corp-tower-server
      exit 0
    fi

    echo "already_current=false" >> /tmp/corp-tower-worker-current.env

    sudo docker run -d \
      --name corp-tower-server-next \
      --restart no \
      -p 3001:3000 \
      -e NODE_ENV=staging \
      -e REDIS_URL="$REDIS_URL" \
      -e RECONNECT_TTL_SECONDS="$RECONNECT_TTL_SECONDS" \
      "$IMAGE_URI"

    for attempt in $(seq 1 30); do
      HEALTH_STATUS="$(sudo docker inspect -f '{% raw %}{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}{% endraw %}' corp-tower-server-next)"
      if { [ "$HEALTH_STATUS" = "healthy" ] || [ "$HEALTH_STATUS" = "running" ]; } && timeout 5 bash -c "cat < /dev/null > /dev/tcp/127.0.0.1/3001"; then
        sudo docker ps --filter name=corp-tower-server
        exit 0
      fi

      sleep 2
    done

    sudo docker logs corp-tower-server-next 2>/dev/null || true
    sudo docker rm -f corp-tower-server-next 2>/dev/null || true
    echo "::error::Candidate server container did not become healthy; current server was not replaced."
    exit 1
  args:
    executable: /bin/bash
  changed_when: true
