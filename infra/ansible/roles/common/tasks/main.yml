---
- name: Verify passwordless sudo
  ansible.builtin.command: sudo -n true
  changed_when: false

- name: Check Docker CLI
  ansible.builtin.shell: command -v docker
  register: docker_cli_check
  changed_when: false
  failed_when: false

- name: Check AWS CLI
  ansible.builtin.shell: command -v aws
  register: aws_cli_check
  changed_when: false
  failed_when: false

- name: Install Docker and AWS CLI when missing
  ansible.builtin.command: sudo dnf install -y docker aws-cli
  when: docker_cli_check.rc != 0 or aws_cli_check.rc != 0
  changed_when: true

- name: Enable and start Docker
  ansible.builtin.command: sudo systemctl enable --now docker
  changed_when: false

- name: Verify Docker daemon
  ansible.builtin.command: timeout 30 sudo docker version
  changed_when: false
