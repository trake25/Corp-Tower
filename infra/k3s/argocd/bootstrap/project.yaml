apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: corp-tower-lab
  namespace: argocd
spec:
  description: Corp Tower K3s lab applications
  sourceRepos:
    - https://github.com/trake25/Corp-Tower.git
  destinations:
    - namespace: corp-tower
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
