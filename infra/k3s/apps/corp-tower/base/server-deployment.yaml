apiVersion: apps/v1
kind: Deployment
metadata:
  name: corp-tower-server
  labels:
    app.kubernetes.io/name: corp-tower-server
    app.kubernetes.io/part-of: corp-tower
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: corp-tower-server
      app.kubernetes.io/part-of: corp-tower
  template:
    metadata:
      labels:
        app.kubernetes.io/name: corp-tower-server
        app.kubernetes.io/part-of: corp-tower
    spec:
      imagePullSecrets:
        - name: ecr-pull
      containers:
        - name: corp-tower-server
          image: corp-tower-server:lab-placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: websocket
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: staging
            - name: PORT
              value: "3000"
            - name: REDIS_URL
              value: redis://redis:6379
            - name: RECONNECT_TTL_SECONDS
              value: "10"
            - name: REDIS_CONNECT_RETRIES
              value: "180"
            - name: REDIS_CONNECT_RETRY_DELAY_MS
              value: "2000"
          readinessProbe:
            tcpSocket:
              port: websocket
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: websocket
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
