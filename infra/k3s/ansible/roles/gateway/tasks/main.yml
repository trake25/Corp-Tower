---
- name: Verify passwordless sudo
  ansible.builtin.command: sudo -n true
  changed_when: false

- name: Install missing gateway prerequisites
  ansible.builtin.shell: |
    set -euo pipefail
    packages=""

    command -v python3 >/dev/null 2>&1 || packages="$packages python3"
    command -v curl >/dev/null 2>&1 || packages="$packages curl-minimal"
    command -v jq >/dev/null 2>&1 || packages="$packages jq"
    command -v aws >/dev/null 2>&1 || packages="$packages awscli"
    command -v ip >/dev/null 2>&1 || packages="$packages iproute"
    command -v iptables >/dev/null 2>&1 || packages="$packages iptables-nft"
    command -v docker >/dev/null 2>&1 || packages="$packages docker"

    if [ -z "$packages" ]; then
      echo "gateway prerequisites already installed"
      exit 0
    fi

    echo "installing gateway packages:$packages"
    sudo dnf install -y $packages
  args:
    executable: /bin/bash
  register: gateway_prerequisites
  changed_when: "'installing gateway packages:' in gateway_prerequisites.stdout"

- name: Verify gateway prerequisite commands
  ansible.builtin.shell: "command -v {{ item }}"
  args:
    executable: /bin/bash
  changed_when: false
  loop:
    - python3
    - curl
    - jq
    - aws
    - ip
    - iptables
    - docker

- name: Enable Docker on EC2-GW
  ansible.builtin.command: sudo systemctl enable --now docker
  changed_when: false

- name: Ensure Corp Tower K3s config directory
  ansible.builtin.file:
    path: /etc/corp-tower/k3s
    state: directory
    owner: root
    group: root
    mode: "0700"
  become: true

- name: Install Server K3s NAT script
  ansible.builtin.template:
    src: corp-tower-k3s-nat.sh.j2
    dest: /usr/local/bin/corp-tower-k3s-nat
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Install Server K3s NAT service
  ansible.builtin.copy:
    dest: /etc/systemd/system/corp-tower-k3s-nat.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Corp Tower Server K3s EC2-GW NAT
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/usr/local/bin/corp-tower-k3s-nat

      [Install]
      WantedBy=multi-user.target
  become: true

- name: Enable and run Server K3s NAT service
  ansible.builtin.shell: |
    set -euo pipefail
    sudo systemctl daemon-reload
    sudo systemctl enable corp-tower-k3s-nat.service
    sudo systemctl restart corp-tower-k3s-nat.service
  args:
    executable: /bin/bash
  changed_when: true

- name: Require Cloudflare API token and zone ID for gateway boot updater
  ansible.builtin.assert:
    that:
      - lookup('ansible.builtin.env', 'CLOUDFLARE_API_TOKEN') | length > 0
      - lookup('ansible.builtin.env', 'CLOUDFLARE_ZONE_ID') | length > 0
    fail_msg: "CLOUDFLARE_API_TOKEN and CLOUDFLARE_ZONE_ID must be provided as GitHub staging environment secrets."
  no_log: true

- name: Install Cloudflare updater secret
  ansible.builtin.copy:
    dest: /etc/corp-tower/k3s/cloudflare.env
    owner: root
    group: root
    mode: "0600"
    content: |
      CLOUDFLARE_RECORD_NAME={{ gateway_domain }}
      CLOUDFLARE_ZONE_ID={{ lookup('ansible.builtin.env', 'CLOUDFLARE_ZONE_ID') }}
      CLOUDFLARE_API_TOKEN={{ lookup('ansible.builtin.env', 'CLOUDFLARE_API_TOKEN') }}
  become: true
  no_log: true

- name: Install Cloudflare boot updater script
  ansible.builtin.copy:
    dest: /usr/local/bin/corp-tower-k3s-cloudflare-update
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      source /etc/corp-tower/k3s/cloudflare.env

      IMDS_TOKEN="$(
        curl -fsS \
          --connect-timeout 2 \
          --max-time 5 \
          -X PUT \
          -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" \
          "http://169.254.169.254/latest/api/token"
      )"

      PUBLIC_IP="$(
        curl -fsS \
          --connect-timeout 2 \
          --max-time 5 \
          -H "X-aws-ec2-metadata-token: ${IMDS_TOKEN}" \
          "http://169.254.169.254/latest/meta-data/public-ipv4"
      )"

      AUTH_HEADER="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"

      EXISTING_RECORD_ID="$(
        curl -fsS \
          --connect-timeout 5 \
          --max-time 15 \
          -H "${AUTH_HEADER}" \
          -H "Content-Type: application/json" \
          --get "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records" \
          --data-urlencode "type=A" \
          --data-urlencode "name=${CLOUDFLARE_RECORD_NAME}" \
        | jq -r '.result[0].id // empty'
      )"

      if [ -n "${EXISTING_RECORD_ID}" ]; then
        RESPONSE="$(
          curl -fsS \
            --connect-timeout 5 \
            --max-time 15 \
            -X PATCH \
            -H "${AUTH_HEADER}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records/${EXISTING_RECORD_ID}" \
            --data "$(jq -n --arg ip "${PUBLIC_IP}" '{content:$ip}')"
        )"
      else
        RESPONSE="$(
          curl -fsS \
            --connect-timeout 5 \
            --max-time 15 \
            -X POST \
            -H "${AUTH_HEADER}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records" \
            --data "$(jq -n --arg name "${CLOUDFLARE_RECORD_NAME}" --arg ip "${PUBLIC_IP}" '{type:"A",name:$name,content:$ip,ttl:60,proxied:false}')"
        )"
      fi

      SUCCESS="$(printf '%s\n' "${RESPONSE}" | jq -r '.success')"
      if [ "${SUCCESS}" != "true" ]; then
        echo "Cloudflare DNS update failed: ${RESPONSE}"
        exit 1
      fi

      echo "Cloudflare DNS record ${CLOUDFLARE_RECORD_NAME} updated to ${PUBLIC_IP}."
  become: true

- name: Install Cloudflare boot updater service
  ansible.builtin.copy:
    dest: /etc/systemd/system/corp-tower-k3s-cloudflare-update.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Update Corp Tower Server K3s Cloudflare gateway record
      Wants=network-online.target
      After=network-online.target
      StartLimitIntervalSec=10min
      StartLimitBurst=10

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/corp-tower-k3s-cloudflare-update
      Restart=on-failure
      RestartSec=30s

      [Install]
      WantedBy=multi-user.target
  become: true

- name: Enable and run Cloudflare boot updater
  ansible.builtin.shell: |
    set -euo pipefail
    sudo systemctl daemon-reload
    sudo systemctl enable corp-tower-k3s-cloudflare-update.service
    sudo systemctl restart corp-tower-k3s-cloudflare-update.service
  args:
    executable: /bin/bash
  changed_when: true
