---
- name: Require active K3s NodePort upstreams
  ansible.builtin.assert:
    that:
      - active_k3s_node_private_ips is defined
      - active_k3s_node_private_ips | length > 0
    fail_msg: "active_k3s_node_private_ips must include at least one private K3s node IP."

- name: Render Server K3s Caddyfile
  ansible.builtin.template:
    src: corp-tower-k3s-caddy.Caddyfile.j2
    dest: /etc/corp-tower/k3s/Caddyfile
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Pull Caddy image
  ansible.builtin.command: timeout 180 sudo docker pull caddy:2-alpine
  changed_when: true

- name: Check for restored Caddy ACME cache archive
  ansible.builtin.stat:
    path: /tmp/corp-tower-caddy-data.tar.gz
  register: caddy_data_archive

- name: Restrict permissions on restored archive before use
  ansible.builtin.file:
    path: /tmp/corp-tower-caddy-data.tar.gz
    mode: "0600"
  when: caddy_data_archive.stat.exists

- name: Restore Caddy ACME cache from archive
  ansible.builtin.command: >
    sudo docker run --rm
    -v corp-tower-k3s-caddy-data:/data
    -v /tmp:/restore:ro
    caddy:2-alpine
    tar xzf /restore/corp-tower-caddy-data.tar.gz -C /data
  when: caddy_data_archive.stat.exists
  changed_when: true

- name: Remove restored archive after extraction
  ansible.builtin.file:
    path: /tmp/corp-tower-caddy-data.tar.gz
    state: absent
  when: caddy_data_archive.stat.exists

- name: Validate rendered Server K3s Caddyfile
  ansible.builtin.command: >
    timeout 30 sudo docker run --rm
    -v /etc/corp-tower/k3s/Caddyfile:/etc/caddy/Caddyfile:ro
    caddy:2-alpine caddy validate --config /etc/caddy/Caddyfile
  changed_when: false

- name: Start or reload Server K3s Caddy gateway
  ansible.builtin.shell: |
    set -euo pipefail
    sudo docker rm -f corp-tower-k3s-caddy >/dev/null 2>&1 || true

    sudo docker run -d \
      --name corp-tower-k3s-caddy \
      --restart unless-stopped \
      -p 80:80 \
      -p 443:443 \
      -v /etc/corp-tower/k3s/Caddyfile:/etc/caddy/Caddyfile:ro \
      -v corp-tower-k3s-caddy-data:/data \
      -v corp-tower-k3s-caddy-config:/config \
      caddy:2-alpine
  args:
    executable: /bin/bash
  changed_when: true

- name: Give Caddy a moment to start or crash
  ansible.builtin.pause:
    seconds: 3

- name: Verify Server K3s Caddy gateway container is running
  block:
    - name: Check Caddy container state
      ansible.builtin.command: >
        sudo docker inspect -f "{{ '{{' }}.State.Running{{ '}}' }}" corp-tower-k3s-caddy
      register: caddy_container_running
      changed_when: false
      failed_when: caddy_container_running.stdout | trim != "true"
  rescue:
    - name: Capture Caddy container logs for diagnosis
      ansible.builtin.command: sudo docker logs --tail 200 corp-tower-k3s-caddy
      register: caddy_logs
      changed_when: false
      failed_when: false

    - name: Fail with Caddy logs
      ansible.builtin.fail:
        msg: "corp-tower-k3s-caddy is not running after start/reload. Logs:\n{{ caddy_logs.stdout }}\n{{ caddy_logs.stderr }}"

- name: Archive current Caddy ACME cache for persistence
  ansible.builtin.command: >
    sudo docker run --rm
    -v corp-tower-k3s-caddy-data:/data
    -v /tmp:/backup
    caddy:2-alpine
    tar czf /backup/corp-tower-caddy-data.tar.gz -C /data .
  changed_when: true

- name: Restrict ownership and permissions on archived Caddy state
  ansible.builtin.file:
    path: /tmp/corp-tower-caddy-data.tar.gz
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  become: true
