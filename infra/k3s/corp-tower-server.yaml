apiVersion: v1
kind: Namespace
metadata:
  name: corp-tower-staging
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: corp-tower-server-config
  namespace: corp-tower-staging
data:
  PORT: "3000"
  REDIS_URL: "__REDIS_URL__"
  RECONNECT_TTL_SECONDS: "10"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: corp-tower-server
  namespace: corp-tower-staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: corp-tower-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: corp-tower-server
    spec:
      nodeSelector:
        corp-tower-role: worker
      imagePullSecrets:
        - name: ecr-registry
      containers:
        - name: server
          image: "__IMAGE_URI__"
          imagePullPolicy: Always
          ports:
            - name: websocket
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: corp-tower-server-config
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: corp-tower-server
  namespace: corp-tower-staging
spec:
  type: NodePort
  selector:
    app: corp-tower-server
  ports:
    - name: websocket
      port: 3000
      targetPort: 3000
      nodePort: 30080
