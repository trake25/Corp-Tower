apiVersion: v1
kind: Secret
metadata:
  name: corp-tower-server-secrets
type: Opaque
stringData:
  REDIS_URL: "rediss://REPLACE_WITH_ELASTICACHE_ENDPOINT:6379"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: corp-tower-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: corp-tower-server
  template:
    metadata:
      labels:
        app: corp-tower-server
    spec:
      containers:
        - name: server
          image: REPLACE_WITH_ECR_REPOSITORY:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: POD_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: corp-tower-server-secrets
                  key: REDIS_URL
            - name: RECONNECT_TTL_SECONDS
              value: "60"
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: corp-tower-server
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-target-group-attributes: "stickiness.enabled=true,stickiness.type=source_ip"
spec:
  type: LoadBalancer
  selector:
    app: corp-tower-server
  ports:
    - name: websocket
      port: 3000
      targetPort: 3000
