name: Staging Server Update

on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: server-staging-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  IMAGE_NAME: corp-tower-server

jobs:
  test-server:
    name: Test Server On GitHub VM
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: src/Server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.14.1"
          cache: npm
          cache-dependency-path: src/Server/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Run server tests
        run: |
          set -euo pipefail
          start_time="$(date +%s)"
          npm test
          end_time="$(date +%s)"
          echo "Server tests completed in $((end_time - start_time)) seconds." >> "$GITHUB_STEP_SUMMARY"

  build-and-push:
    name: Build And Push Docker Image To ECR
    runs-on: ubuntu-24.04
    needs: test-server
    if: ${{ needs.test-server.result == 'success' }}
    timeout-minutes: 15
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: src/Server
          file: src/Server/Dockerfile
          push: true
          tags: ${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record pushed image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
          echo "Docker image pushed: $IMAGE_URI" >> "$GITHUB_STEP_SUMMARY"

      - name: Show pushed image
        run: echo "Pushed $IMAGE_URI"

  deploy-staging:
    name: Deploy Docker Image To Staging EC2
    runs-on: ubuntu-24.04
    needs: build-and-push
    if: ${{ needs.build-and-push.result == 'success' }}
    timeout-minutes: 15
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: infra/ansible/requirements.txt

      - name: Install Ansible
        run: |
          set -euo pipefail
          ansible_start_time="$(date +%s)"

          python -m pip install --upgrade pip
          python -m pip install -r infra/ansible/requirements.txt
          ansible --version

          ansible_end_time="$(date +%s)"
          {
            echo "## Ansible setup"
            echo
            echo "- Duration: \`$((ansible_end_time - ansible_start_time)) seconds\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Test Ansible inventory generator
        run: python -m unittest discover -s infra/ansible/tests

      - name: Resolve EC2 learning lab targets
        env:
          EC2_USER: ${{ secrets.EC2_STAGING_USER }}
          EC2_PORT: ${{ secrets.EC2_STAGING_PORT || 22 }}
        run: |
          set -euo pipefail
          resolve_start_time="$(date +%s)"

          mkdir -p "$RUNNER_TEMP/corp-tower"
          INSTANCES_JSON="$RUNNER_TEMP/corp-tower/staging-instances.json"
          INVENTORY_JSON="$RUNNER_TEMP/corp-tower/staging-inventory.json"

          aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=corp-tower" \
              "Name=tag:Environment,Values=staging" \
              "Name=tag:Role,Values=gateway-redis-proxy-learning,gateway-redis-proxy-k3s-learning,docker-server-worker" \
              "Name=instance-state-name,Values=running" \
            --output json > "$INSTANCES_JSON"

          python infra/ansible/scripts/generate_staging_inventory.py \
            --instances-json "$INSTANCES_JSON" \
            --inventory "$INVENTORY_JSON" \
            --ssh-user "$EC2_USER" \
            --ssh-port "$EC2_PORT" \
            --ssh-key-file "$HOME/.ssh/ec2_key" \
            --known-hosts-file "$HOME/.ssh/known_hosts" \
            --github-env "$GITHUB_ENV" \
            --github-summary "$GITHUB_STEP_SUMMARY"

          resolve_end_time="$(date +%s)"
          {
            echo "- Duration: \`$((resolve_end_time - resolve_start_time)) seconds\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare SSH for Ansible
        env:
          EC2_PORT: ${{ secrets.EC2_STAGING_PORT || 22 }}
          EC2_SSH_KEY: ${{ secrets.EC2_STAGING_SSH_KEY }}
        run: |
          set -euo pipefail
          ssh_start_time="$(date +%s)"

          mkdir -p ~/.ssh
          mkdir -p ~/.ansible/cp
          chmod 700 ~/.ssh
          chmod 700 ~/.ansible
          chmod 700 ~/.ansible/cp
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          DEPLOY_PHASE="ssh setup"
          trap 'echo "::error::Deploy failed during ${DEPLOY_PHASE} near line ${LINENO}."' ERR

          prepare_known_host() {
            local host="$1"
            local scan_output=""

            ssh-keygen -R "[$host]:$EC2_PORT" -f ~/.ssh/known_hosts >/dev/null 2>&1 || true
            ssh-keygen -R "$host" -f ~/.ssh/known_hosts >/dev/null 2>&1 || true

            for attempt in $(seq 1 6); do
              scan_output="$(ssh-keyscan -T 10 -p "$EC2_PORT" -H "$host" 2>/dev/null || true)"
              if [ -n "$scan_output" ]; then
                printf '%s\n' "$scan_output" >> ~/.ssh/known_hosts
                return 0
              fi

              echo "Waiting for SSH host key from ${host}:${EC2_PORT} (attempt ${attempt}/6)."
              sleep 5
            done

            echo "::error::Could not fetch SSH host key from ${host}:${EC2_PORT}. Check SSH security group, route table, NACL, public IP, and instance status."
            return 1
          }

          prepare_known_host "$GATEWAY_PUBLIC_IP"

          for WORKER_HOST in $WORKER_PUBLIC_IPS; do
            prepare_known_host "$WORKER_HOST"
          done

          ssh_end_time="$(date +%s)"
          {
            echo "## SSH known_hosts setup"
            echo
            echo "- Gateway: \`$GATEWAY_PUBLIC_IP\`"
            echo "- Workers: \`$WORKER_PUBLIC_IPS\`"
            echo "- Duration: \`$((ssh_end_time - ssh_start_time)) seconds\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run Ansible syntax check
        env:
          ANSIBLE_CONFIG: infra/ansible/ansible.cfg
        run: |
          set -euo pipefail
          ansible-playbook \
            -i "$ANSIBLE_INVENTORY" \
            infra/ansible/playbooks/staging_deploy.yml \
            --syntax-check

      - name: Deploy with Ansible
        env:
          ANSIBLE_CONFIG: infra/ansible/ansible.cfg
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          deploy_start_time="$(date +%s)"

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          ansible-playbook \
            -i "$ANSIBLE_INVENTORY" \
            infra/ansible/playbooks/staging_deploy.yml \
            -e "aws_region=${AWS_REGION}" \
            -e "ecr_registry=${ECR_REGISTRY}" \
            -e "image_uri=${IMAGE_URI}" \
            -e "reconnect_ttl_seconds=10"

          deploy_end_time="$(date +%s)"
          {
            echo "## Ansible staging deploy"
            echo
            echo "- Image: \`$IMAGE_URI\`"
            echo "- Gateway URL: \`ws://${GATEWAY_PUBLIC_IP}:3000\`"
            echo "- Duration: \`$((deploy_end_time - deploy_start_time)) seconds\`"
          } >> "$GITHUB_STEP_SUMMARY"
