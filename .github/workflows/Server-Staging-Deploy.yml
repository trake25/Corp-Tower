name: Server Staging Deploy

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/Server/**"
      - "infra/k3s/**"
      - ".github/workflows/Server-Staging-Deploy.yml"
  workflow_dispatch:

concurrency:
  group: server-staging-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: corp-tower-server

jobs:
  test-server:
    name: Test Server On GitHub VM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: src/Server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"

      - name: Install server dependencies
        run: npm install

      - name: Run server tests
        run: npm test

  build-and-push:
    name: Build And Push Docker Image To ECR
    runs-on: ubuntu-latest
    needs: test-server
    if: ${{ needs.test-server.result == 'success' }}
    timeout-minutes: 15
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          STAGING_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:staging"

          docker build -f src/Server/Dockerfile -t "$IMAGE_URI" -t "$STAGING_URI" src/Server
          docker push "$IMAGE_URI"
          docker push "$STAGING_URI"

          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Show pushed image
        run: echo "Pushed ${{ env.IMAGE_URI }}"

  deploy-staging:
    name: Deploy Docker Image To Staging EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ needs.build-and-push.result == 'success' }}
    timeout-minutes: 15
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve EC2 learning lab targets
        run: |
          set -euo pipefail

          WORKER_PRIVATE_IPS="$(
            aws ec2 describe-instances \
              --filters \
                "Name=tag:Project,Values=corp-tower" \
                "Name=tag:Environment,Values=staging" \
                "Name=tag:Role,Values=docker-server-worker" \
                "Name=instance-state-name,Values=running" \
              --query 'Reservations[].Instances[].PrivateIpAddress' \
              --output text
          )"

          WORKER_PUBLIC_IPS="$(
            aws ec2 describe-instances \
              --filters \
                "Name=tag:Project,Values=corp-tower" \
                "Name=tag:Environment,Values=staging" \
                "Name=tag:Role,Values=docker-server-worker" \
                "Name=instance-state-name,Values=running" \
              --query 'Reservations[].Instances[].PublicIpAddress' \
              --output text
          )"

          GATEWAY_PRIVATE_IP="$(
            aws ec2 describe-instances \
              --filters \
                "Name=tag:Project,Values=corp-tower" \
                "Name=tag:Environment,Values=staging" \
                "Name=tag:Role,Values=gateway-redis-proxy-k3s-learning" \
                "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].PrivateIpAddress' \
              --output text
          )"

          if [ -z "$WORKER_PRIVATE_IPS" ] || [ -z "$WORKER_PUBLIC_IPS" ] || [ "$GATEWAY_PRIVATE_IP" = "None" ]; then
            echo "Gateway or worker EC2 instances not found. Run Infra Staging Terraform target ec2-learning-lab first."
            exit 1
          fi

          echo "WORKER_PRIVATE_IPS=$WORKER_PRIVATE_IPS" >> "$GITHUB_ENV"
          echo "WORKER_PUBLIC_IPS=$WORKER_PUBLIC_IPS" >> "$GITHUB_ENV"
          echo "GATEWAY_PRIVATE_IP=$GATEWAY_PRIVATE_IP" >> "$GITHUB_ENV"

      - name: Deploy over SSH
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          WORKER_PRIVATE_IPS: ${{ env.WORKER_PRIVATE_IPS }}
          WORKER_PUBLIC_IPS: ${{ env.WORKER_PUBLIC_IPS }}
          GATEWAY_PRIVATE_IP: ${{ env.GATEWAY_PRIVATE_IP }}
          EC2_HOST: ${{ secrets.EC2_STAGING_HOST }}
          EC2_USER: ${{ secrets.EC2_STAGING_USER }}
          EC2_PORT: ${{ secrets.EC2_STAGING_PORT || 22 }}
          EC2_SSH_KEY: ${{ secrets.EC2_STAGING_SSH_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "$EC2_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts

          REDIS_URL="redis://${GATEWAY_PRIVATE_IP}:6379"

          for WORKER_HOST in $WORKER_PUBLIC_IPS; do
            ssh-keyscan -p "$EC2_PORT" "$WORKER_HOST" >> ~/.ssh/known_hosts
          done

          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "GATEWAY_PRIVATE_IP='$GATEWAY_PRIVATE_IP' bash -s" <<'REMOTE_GATEWAY_REDIS'
          set -euo pipefail

          sudo docker network create corp-tower-gateway 2>/dev/null || true

          # Remove legacy single-EC2 server container so gateway proxy can own port 3000 later.
          sudo docker stop corp-tower-server 2>/dev/null || true
          sudo docker rm corp-tower-server 2>/dev/null || true

          if ! command -v k3s >/dev/null 2>&1; then
            curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik --node-ip ${GATEWAY_PRIVATE_IP}" sh -
          fi

          sudo docker stop corp-tower-redis 2>/dev/null || true
          sudo docker rm corp-tower-redis 2>/dev/null || true
          sudo docker run -d \
            --name corp-tower-redis \
            --restart unless-stopped \
            --network corp-tower-gateway \
            -p 6379:6379 \
            redis:7-alpine redis-server --bind 0.0.0.0 --protected-mode no

          for attempt in $(seq 1 30); do
            if sudo docker exec corp-tower-redis redis-cli ping | grep -q PONG; then
              exit 0
            fi
            sleep 1
          done

          echo "Redis did not become ready."
          sudo docker logs corp-tower-redis
          exit 1
          REMOTE_GATEWAY_REDIS

          K3S_TOKEN="$(
            ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
              "sudo cat /var/lib/rancher/k3s/server/node-token"
          )"

          for WORKER_HOST in $WORKER_PUBLIC_IPS; do
            ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$WORKER_HOST" \
              "K3S_URL='https://${GATEWAY_PRIVATE_IP}:6443' K3S_TOKEN='$K3S_TOKEN' bash -s" <<'REMOTE_WORKER'
          set -euo pipefail

          sudo docker stop corp-tower-server 2>/dev/null || true
          sudo docker rm corp-tower-server 2>/dev/null || true

          if ! command -v k3s >/dev/null 2>&1; then
            curl -sfL https://get.k3s.io | K3S_URL="$K3S_URL" K3S_TOKEN="$K3S_TOKEN" sh -
          fi
          REMOTE_WORKER
          done

          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "WORKER_PRIVATE_IPS='$WORKER_PRIVATE_IPS' bash -s" <<'REMOTE_LABEL_WORKERS'
          set -euo pipefail

          for attempt in $(seq 1 60); do
            READY_WORKERS=0

            for WORKER_IP in $WORKER_PRIVATE_IPS; do
              NODE_NAME="$(
                sudo k3s kubectl get nodes -o wide --no-headers \
                  | awk -v ip="$WORKER_IP" '$6 == ip {print $1}'
              )"

              if [ -n "$NODE_NAME" ]; then
                sudo k3s kubectl label node "$NODE_NAME" corp-tower-role=worker --overwrite
                READY_WORKERS=$((READY_WORKERS + 1))
              fi
            done

            if [ "$READY_WORKERS" -ge 2 ]; then
              exit 0
            fi

            sleep 5
          done

          sudo k3s kubectl get nodes -o wide
          echo "Expected 2 labeled k3s worker nodes."
          exit 1
          REMOTE_LABEL_WORKERS

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          scp -i ~/.ssh/ec2_key -P "$EC2_PORT" \
            infra/k3s/corp-tower-server.yaml \
            "$EC2_USER@$EC2_HOST:/tmp/corp-tower-server.yaml"

          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "AWS_REGION='$AWS_REGION' IMAGE_URI='$IMAGE_URI' REDIS_URL='$REDIS_URL' ECR_REGISTRY='$ECR_REGISTRY' bash -s" <<'REMOTE_K3S_APPLY'
          set -euo pipefail

          sed \
            -e "s#__IMAGE_URI__#${IMAGE_URI}#g" \
            -e "s#__REDIS_URL__#${REDIS_URL}#g" \
            /tmp/corp-tower-server.yaml > /tmp/corp-tower-server.rendered.yaml

          sudo k3s kubectl create namespace corp-tower-staging \
            --dry-run=client -o yaml | sudo k3s kubectl apply -f -

          ECR_PASSWORD="$(aws ecr get-login-password --region "$AWS_REGION")"
          sudo k3s kubectl -n corp-tower-staging create secret docker-registry ecr-registry \
            --docker-server="$ECR_REGISTRY" \
            --docker-username=AWS \
            --docker-password="$ECR_PASSWORD" \
            --dry-run=client -o yaml | sudo k3s kubectl apply -f -

          sudo k3s kubectl apply -f /tmp/corp-tower-server.rendered.yaml
          sudo k3s kubectl -n corp-tower-staging rollout status deployment/corp-tower-server --timeout=180s
          sudo k3s kubectl -n corp-tower-staging get pods -o wide
          REMOTE_K3S_APPLY

          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "bash -s" <<'REMOTE_GATEWAY'
          set -euo pipefail

          {
            echo "events {}"
            echo "http {"
            echo "  upstream corp_tower_workers {"
            echo "    server 127.0.0.1:30080;"
            echo "  }"
            echo "  server {"
            echo "    listen 3000;"
            echo "    location / {"
            echo "      proxy_pass http://corp_tower_workers;"
            echo "      proxy_http_version 1.1;"
            echo "      proxy_set_header Upgrade \$http_upgrade;"
            echo "      proxy_set_header Connection \"Upgrade\";"
            echo "      proxy_set_header Host \$host;"
            echo "    }"
            echo "  }"
            echo "}"
          } > /tmp/corp-tower-nginx.conf

          sudo docker run --rm \
            -v /tmp/corp-tower-nginx.conf:/etc/nginx/nginx.conf:ro \
            nginx:1.27-alpine nginx -t

          sudo docker stop corp-tower-gateway 2>/dev/null || true
          sudo docker rm corp-tower-gateway 2>/dev/null || true
          sudo docker run -d \
            --name corp-tower-gateway \
            --restart unless-stopped \
            -p 3000:3000 \
            -v /tmp/corp-tower-nginx.conf:/etc/nginx/nginx.conf:ro \
            nginx:1.27-alpine

          sudo docker ps --filter name=corp-tower
          REMOTE_GATEWAY
