name: Server Staging Deploy

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/Server/**"
      - ".github/workflows/Server-Staging-Deploy.yml"
  workflow_dispatch:

concurrency:
  group: server-staging-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: corp-tower-server

jobs:
  test-server:
    name: Test Server On GitHub VM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: src/Server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"

      - name: Install server dependencies
        run: npm install

      - name: Run server tests
        run: npm test

  build-and-push:
    name: Build And Push Docker Image To ECR
    runs-on: ubuntu-latest
    needs: test-server
    if: ${{ needs.test-server.result == 'success' }}
    timeout-minutes: 15
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          STAGING_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:staging"

          docker build -f src/Server/Dockerfile -t "$IMAGE_URI" -t "$STAGING_URI" src/Server
          docker push "$IMAGE_URI"
          docker push "$STAGING_URI"

          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Show pushed image
        run: echo "Pushed ${{ env.IMAGE_URI }}"

  deploy-staging:
    name: Deploy Docker Image To Staging EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ needs.build-and-push.result == 'success' }}
    timeout-minutes: 15
    environment: staging

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve EC2 learning lab targets
        run: |
          set -euo pipefail

          WORKER_PRIVATE_IPS="$(
            aws ec2 describe-instances \
              --filters \
                "Name=tag:Project,Values=corp-tower" \
                "Name=tag:Environment,Values=staging" \
                "Name=tag:Role,Values=docker-server-worker" \
                "Name=instance-state-name,Values=running" \
              --query 'Reservations[].Instances[].PrivateIpAddress' \
              --output text
          )"

          WORKER_PUBLIC_IPS="$(
            aws ec2 describe-instances \
              --filters \
                "Name=tag:Project,Values=corp-tower" \
                "Name=tag:Environment,Values=staging" \
                "Name=tag:Role,Values=docker-server-worker" \
                "Name=instance-state-name,Values=running" \
              --query 'Reservations[].Instances[].PublicIpAddress' \
              --output text
          )"

          GATEWAY_PRIVATE_IP="$(
            aws ec2 describe-instances \
              --filters \
                "Name=tag:Project,Values=corp-tower" \
                "Name=tag:Environment,Values=staging" \
                "Name=tag:Role,Values=gateway-redis-proxy-k3s-learning" \
                "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].PrivateIpAddress' \
              --output text
          )"

          if [ -z "$WORKER_PRIVATE_IPS" ] || [ -z "$WORKER_PUBLIC_IPS" ] || [ "$GATEWAY_PRIVATE_IP" = "None" ]; then
            echo "Gateway or worker EC2 instances not found. Run Infra Staging Terraform target ec2-learning-lab first."
            exit 1
          fi

          echo "WORKER_PRIVATE_IPS=$WORKER_PRIVATE_IPS" >> "$GITHUB_ENV"
          echo "WORKER_PUBLIC_IPS=$WORKER_PUBLIC_IPS" >> "$GITHUB_ENV"
          echo "GATEWAY_PRIVATE_IP=$GATEWAY_PRIVATE_IP" >> "$GITHUB_ENV"

      - name: Deploy over SSH
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          WORKER_PRIVATE_IPS: ${{ env.WORKER_PRIVATE_IPS }}
          WORKER_PUBLIC_IPS: ${{ env.WORKER_PUBLIC_IPS }}
          GATEWAY_PRIVATE_IP: ${{ env.GATEWAY_PRIVATE_IP }}
          EC2_HOST: ${{ secrets.EC2_STAGING_HOST }}
          EC2_USER: ${{ secrets.EC2_STAGING_USER }}
          EC2_PORT: ${{ secrets.EC2_STAGING_PORT || 22 }}
          EC2_SSH_KEY: ${{ secrets.EC2_STAGING_SSH_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "$EC2_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts

          REDIS_URL="redis://${GATEWAY_PRIVATE_IP}:6379"

          for WORKER_HOST in $WORKER_PUBLIC_IPS; do
            ssh-keyscan -p "$EC2_PORT" "$WORKER_HOST" >> ~/.ssh/known_hosts
          done

          for WORKER_HOST in $WORKER_PUBLIC_IPS; do
            ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$WORKER_HOST" \
              "AWS_REGION='$AWS_REGION' ECR_REPOSITORY='$ECR_REPOSITORY' IMAGE_TAG='$IMAGE_TAG' REDIS_URL='$REDIS_URL' bash -s" <<'REMOTE_WORKER'
          set -euo pipefail

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          aws ecr get-login-password --region "$AWS_REGION" | sudo docker login --username AWS --password-stdin "$ECR_REGISTRY"

          sudo docker pull "$IMAGE_URI"

          sudo docker stop corp-tower-server 2>/dev/null || true
          sudo docker rm corp-tower-server 2>/dev/null || true

          sudo docker run -d \
            --name corp-tower-server \
            --restart unless-stopped \
            -p 3000:3000 \
            -e PORT=3000 \
            -e REDIS_URL="$REDIS_URL" \
            -e RECONNECT_TTL_SECONDS=60 \
            "$IMAGE_URI"

          sudo docker image prune -f
          sudo docker ps --filter name=corp-tower-server
          REMOTE_WORKER
          done

          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "WORKER_PRIVATE_IPS='$WORKER_PRIVATE_IPS' bash -s" <<'REMOTE_GATEWAY'
          set -euo pipefail

          sudo docker network create corp-tower-gateway 2>/dev/null || true

          # Remove legacy single-EC2 server container so gateway proxy can own port 3000.
          sudo docker stop corp-tower-server 2>/dev/null || true
          sudo docker rm corp-tower-server 2>/dev/null || true

          if ! command -v k3s >/dev/null 2>&1; then
            curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik" sh -
          fi

          sudo docker stop corp-tower-redis 2>/dev/null || true
          sudo docker rm corp-tower-redis 2>/dev/null || true
          sudo docker run -d \
            --name corp-tower-redis \
            --restart unless-stopped \
            --network corp-tower-gateway \
            -p 6379:6379 \
            redis:7-alpine redis-server --bind 0.0.0.0 --protected-mode no

          UPSTREAMS=""
          for WORKER_IP in $WORKER_PRIVATE_IPS; do
            UPSTREAMS="${UPSTREAMS}    server ${WORKER_IP}:3000;\n"
          done

          printf "events {}\nhttp {\n  upstream corp_tower_workers {\n%s  }\n  server {\n    listen 3000;\n    location / {\n      proxy_pass http://corp_tower_workers;\n      proxy_http_version 1.1;\n      proxy_set_header Upgrade \$http_upgrade;\n      proxy_set_header Connection \"Upgrade\";\n      proxy_set_header Host \$host;\n    }\n  }\n}\n" "$UPSTREAMS" > /tmp/corp-tower-nginx.conf

          sudo docker stop corp-tower-gateway 2>/dev/null || true
          sudo docker rm corp-tower-gateway 2>/dev/null || true
          sudo docker run -d \
            --name corp-tower-gateway \
            --restart unless-stopped \
            -p 3000:3000 \
            -v /tmp/corp-tower-nginx.conf:/etc/nginx/nginx.conf:ro \
            nginx:1.27-alpine

          sudo docker ps --filter name=corp-tower
          REMOTE_GATEWAY
