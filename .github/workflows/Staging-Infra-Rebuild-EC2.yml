name: Staging Infra Rebuild EC2

on:
  workflow_dispatch:
    inputs:
      confirm_rebuild:
        description: "Type REBUILD_EC2 to destroy/recreate the staging gateway and worker EC2 instances."
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  TF_VAR_aws_region: ap-southeast-1
  TF_VAR_environment: staging
  TF_VAR_github_repository: ${{ github.repository }}
  TF_VAR_ssh_public_key: ${{ secrets.EC2_STAGING_SSH_PUBLIC_KEY }}
  TF_VAR_ssh_cidr: ${{ secrets.STAGING_SSH_CIDR || '0.0.0.0/0' }}
  TF_VAR_game_port_cidr: ${{ secrets.STAGING_GAME_PORT_CIDR || '0.0.0.0/0' }}
  TF_VAR_staging_subnet_id: ${{ secrets.STAGING_SUBNET_ID || '' }}

jobs:
  rebuild:
    name: Rebuild Staging EC2 Instances
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: staging
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check rebuild confirmation
        run: |
          if [ "${{ inputs.confirm_rebuild }}" != "REBUILD_EC2" ]; then
            echo "confirm_rebuild must be exactly REBUILD_EC2."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Ensure Terraform backend bucket exists
        run: |
          set -euo pipefail
          BUCKET="corp-tower-tfstate-${AWS_REGION}"

          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Terraform backend bucket exists: $BUCKET"
          else
            aws s3api create-bucket \
              --bucket "$BUCKET" \
              --region "$AWS_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION"
          fi

          aws s3api put-bucket-versioning \
            --bucket "$BUCKET" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "$BUCKET" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket "$BUCKET" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

      - name: Terraform init
        run: terraform init -input=false -migrate-state -force-copy

      - name: Terraform fmt check
        run: terraform fmt -check

      - name: Terraform validate
        run: terraform validate

      - name: Plan EC2 rebuild
        run: |
          set -euo pipefail
          terraform plan -input=false -out=tfplan \
            -replace=aws_instance.staging \
            -replace='aws_instance.worker[0]' \
            -replace='aws_instance.worker[1]'

      - name: Show EC2 rebuild plan
        run: terraform show -no-color tfplan

      - name: Apply EC2 rebuild
        run: terraform apply -input=false -auto-approve tfplan

      - name: Show Terraform outputs
        run: terraform output
