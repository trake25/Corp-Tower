name: Server K3s Infra Apply

on:
  workflow_dispatch:
    inputs:
      confirm_apply:
        description: "Type APPLY_SERVER_K3S to apply the reviewed Server K3s infrastructure plan."
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  TF_VAR_aws_region: ap-southeast-1
  TF_VAR_environment: k3s-lab
  TF_VAR_ssh_public_key: ${{ secrets.EC2_STAGING_SSH_PUBLIC_KEY }}
  TF_VAR_ssh_cidr: ${{ secrets.STAGING_SSH_CIDR || '0.0.0.0/0' }}
  TF_VAR_game_port_cidr: ${{ secrets.STAGING_GAME_PORT_CIDR || '0.0.0.0/0' }}
  TF_VAR_ecr_repository_name: ${{ secrets.ECR_REPOSITORY }}

jobs:
  apply:
    name: Apply Server K3s Infrastructure
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment: staging
    defaults:
      run:
        working-directory: infra/k3s/terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check apply confirmation
        run: |
          if [ "${{ inputs.confirm_apply }}" != "APPLY_SERVER_K3S" ]; then
            echo "confirm_apply must be exactly APPLY_SERVER_K3S."
            exit 1
          fi

      - name: Setup AWS credentials and Terraform
        uses: ./.github/actions/aws-terraform-setup
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve SSH public key for Terraform
        uses: ./.github/actions/resolve-ssh-key
        with:
          ssh-private-key: ${{ secrets.EC2_STAGING_SSH_KEY }}

      - name: Ensure Terraform backend bucket exists
        uses: ./.github/actions/terraform-backend-bootstrap
        with:
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform validate and plan before apply
        uses: ./.github/actions/terraform-validate-plan
        with:
          working-directory: infra/k3s/terraform

      - name: Reject destructive infrastructure plan
        run: |
          set -euo pipefail

          DESTRUCTIVE_CHANGES="$(
            terraform show -json tfplan \
              | jq -r '
                .resource_changes[]?
                | select(.change.actions | index("delete"))
                | "\(.address): \(.change.actions | join(","))"
              '
          )"

          if [ -n "$DESTRUCTIVE_CHANGES" ]; then
            echo "::error::Plan includes delete or replace actions. Use Server K3s Cleanup with terraform_destroy for intentional teardown."
            printf '%s\n' "$DESTRUCTIVE_CHANGES"
            exit 1
          fi

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Show Terraform outputs
        run: terraform output
