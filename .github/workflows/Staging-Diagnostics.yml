name: Staging Diagnostics

on:
  workflow_dispatch:
    inputs:
      extra_public_ips:
        description: "Optional public IPs to diagnose, separated by spaces, commas, or new lines."
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      extra_public_ips:
        description: "Optional public IPs to diagnose, separated by spaces, commas, or new lines."
        required: false
        default: ""
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1

jobs:
  diagnostics:
    name: Diagnose Staging EC2
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: staging

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve diagnostic targets
        env:
          EXTRA_PUBLIC_IPS_INPUT: ${{ inputs.extra_public_ips }}
        run: |
          set -euo pipefail

          DISCOVERED_PUBLIC_IPS="$(
            aws ec2 describe-instances \
              --filters \
                "Name=tag:Project,Values=corp-tower" \
                "Name=tag:Environment,Values=staging" \
                "Name=tag:Role,Values=gateway-redis-proxy-learning,gateway-redis-proxy-k3s-learning,docker-server-worker" \
                "Name=instance-state-name,Values=pending,running,stopping,stopped" \
              --query 'Reservations[].Instances[].PublicIpAddress' \
              --output text
          )"

          EXTRA_PUBLIC_IPS="$(printf '%s' "$EXTRA_PUBLIC_IPS_INPUT" | tr ',\r\n' '   ')"
          TARGET_PUBLIC_IPS="$(
            printf '%s\n%s\n' "$DISCOVERED_PUBLIC_IPS" "$EXTRA_PUBLIC_IPS" \
              | tr '[:space:]' '\n' \
              | sed '/^$/d' \
              | sort -u \
              | tr '\n' ' '
          )"

          if [ -z "$TARGET_PUBLIC_IPS" ]; then
            echo "No staging instances or extra public IPs were found."
            exit 1
          fi

          echo "Diagnostic target public IPs: $TARGET_PUBLIC_IPS"
          echo "TARGET_PUBLIC_IPS=$TARGET_PUBLIC_IPS" >> "$GITHUB_ENV"

      - name: Show AWS topology
        run: |
          set -euo pipefail

          echo "::group::Tagged staging instances"
          aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=corp-tower" \
              "Name=tag:Environment,Values=staging" \
              "Name=tag:Role,Values=gateway-redis-proxy-learning,gateway-redis-proxy-k3s-learning,docker-server-worker" \
              "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[].Instances[].{InstanceId:InstanceId,Name:Tags[?Key==`Name`]|[0].Value,Role:Tags[?Key==`Role`]|[0].Value,State:State.Name,PublicIp:PublicIpAddress,PrivateIp:PrivateIpAddress,SubnetId:SubnetId,VpcId:VpcId,SecurityGroups:SecurityGroups[].GroupId}' \
            --output table
          echo "::endgroup::"

          echo "::group::Target instance details"
          for TARGET_HOST in $TARGET_PUBLIC_IPS; do
            aws ec2 describe-instances \
              --filters "Name=ip-address,Values=${TARGET_HOST}" \
              --query 'Reservations[].Instances[].{InstanceId:InstanceId,Name:Tags[?Key==`Name`]|[0].Value,Role:Tags[?Key==`Role`]|[0].Value,State:State.Name,PublicIp:PublicIpAddress,PrivateIp:PrivateIpAddress,SubnetId:SubnetId,VpcId:VpcId,KeyName:KeyName,SecurityGroups:SecurityGroups[].GroupId}' \
              --output table
          done
          echo "::endgroup::"

          echo "::group::Instance status checks"
          TARGET_INSTANCE_IDS="$(
            for TARGET_HOST in $TARGET_PUBLIC_IPS; do
              aws ec2 describe-instances \
                --filters "Name=ip-address,Values=${TARGET_HOST}" \
                --query 'Reservations[].Instances[].InstanceId' \
                --output text
            done | tr '[:space:]' '\n' | sed '/^$/d' | sort -u | tr '\n' ' '
          )"

          if [ -n "$TARGET_INSTANCE_IDS" ]; then
            aws ec2 describe-instance-status \
              --include-all-instances \
              --instance-ids $TARGET_INSTANCE_IDS \
              --query 'InstanceStatuses[].{InstanceId:InstanceId,State:InstanceState.Name,System:SystemStatus.Status,Instance:InstanceStatus.Status,AZ:AvailabilityZone}' \
              --output table
          fi
          echo "::endgroup::"

      - name: Show networking rules
        run: |
          set -euo pipefail

          TARGET_SECURITY_GROUP_IDS="$(
            for TARGET_HOST in $TARGET_PUBLIC_IPS; do
              aws ec2 describe-instances \
                --filters "Name=ip-address,Values=${TARGET_HOST}" \
                --query 'Reservations[].Instances[].SecurityGroups[].GroupId' \
                --output text
            done | tr '[:space:]' '\n' | sed '/^$/d' | sort -u | tr '\n' ' '
          )"

          echo "::group::Security group inbound rules"
          for SECURITY_GROUP_ID in $TARGET_SECURITY_GROUP_IDS; do
            echo "Security group: ${SECURITY_GROUP_ID}"
            aws ec2 describe-security-group-rules \
              --filters "Name=group-id,Values=${SECURITY_GROUP_ID}" \
              --query 'SecurityGroupRules[?IsEgress==`false`].{RuleId:SecurityGroupRuleId,Protocol:IpProtocol,From:FromPort,To:ToPort,Cidr:CidrIpv4,ReferencedGroup:ReferencedGroupInfo.GroupId,Description:Description}' \
              --output table
          done
          echo "::endgroup::"

          echo "::group::Subnet route tables"
          TARGET_SUBNET_IDS="$(
            for TARGET_HOST in $TARGET_PUBLIC_IPS; do
              aws ec2 describe-instances \
                --filters "Name=ip-address,Values=${TARGET_HOST}" \
                --query 'Reservations[].Instances[].SubnetId' \
                --output text
            done | tr '[:space:]' '\n' | sed '/^$/d' | sort -u | tr '\n' ' '
          )"

          for SUBNET_ID in $TARGET_SUBNET_IDS; do
            echo "Subnet: ${SUBNET_ID}"
            aws ec2 describe-route-tables \
              --filters "Name=association.subnet-id,Values=${SUBNET_ID}" \
              --query 'RouteTables[].Routes[].{Destination:DestinationCidrBlock,Gateway:GatewayId,State:State,NatGateway:NatGatewayId}' \
              --output table
          done
          echo "::endgroup::"

          echo "::group::Subnet network ACLs"
          for SUBNET_ID in $TARGET_SUBNET_IDS; do
            echo "Subnet: ${SUBNET_ID}"
            aws ec2 describe-network-acls \
              --filters "Name=association.subnet-id,Values=${SUBNET_ID}" \
              --query 'NetworkAcls[].Entries[].{Rule:RuleNumber,Egress:Egress,Protocol:Protocol,Action:RuleAction,Cidr:CidrBlock,From:PortRange.From,To:PortRange.To}' \
              --output table
          done
          echo "::endgroup::"

      - name: Probe SSH from GitHub runner
        env:
          EC2_USER: ${{ secrets.EC2_STAGING_USER }}
          EC2_PORT: ${{ secrets.EC2_STAGING_PORT || 22 }}
          EC2_SSH_KEY: ${{ secrets.EC2_STAGING_SSH_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          SSH_OPTS=(
            -i ~/.ssh/ec2_key
            -p "$EC2_PORT"
            -o BatchMode=yes
            -o ConnectTimeout=20
            -o ConnectionAttempts=3
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=2
            -o UserKnownHostsFile=~/.ssh/known_hosts
            -o GlobalKnownHostsFile=/dev/null
            -o StrictHostKeyChecking=yes
          )

          prepare_known_host() {
            local host="$1"
            local scan_output=""

            ssh-keygen -R "[$host]:$EC2_PORT" -f ~/.ssh/known_hosts >/dev/null 2>&1 || true
            ssh-keygen -R "$host" -f ~/.ssh/known_hosts >/dev/null 2>&1 || true

            for attempt in $(seq 1 6); do
              scan_output="$(ssh-keyscan -T 10 -p "$EC2_PORT" -H "$host" 2>/dev/null || true)"
              if [ -n "$scan_output" ]; then
                printf '%s\n' "$scan_output" >> ~/.ssh/known_hosts
                return 0
              fi

              echo "Waiting for SSH host key from ${host}:${EC2_PORT} (attempt ${attempt}/6)."
              sleep 5
            done

            echo "::warning::Could not fetch SSH host key from ${host}:${EC2_PORT}."
            return 1
          }

          for TARGET_HOST in $TARGET_PUBLIC_IPS; do
            echo "::group::SSH probe ${TARGET_HOST}"
            if ! prepare_known_host "$TARGET_HOST"; then
              echo "::warning::SSH host key setup failed for ${TARGET_HOST}; skipping SSH probe."
            elif ssh "${SSH_OPTS[@]}" "$EC2_USER@$TARGET_HOST" "hostname && whoami"; then
              echo "SSH probe succeeded for ${TARGET_HOST}."
            else
              echo "::warning::SSH probe failed for ${TARGET_HOST}."
            fi
            echo "::endgroup::"
          done
