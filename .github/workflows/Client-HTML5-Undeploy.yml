name: Client HTML5 Undeploy

on:
  workflow_call:
    inputs:
      mode:
        description: "soft = replace with an offline page. hard = delete the site (404)."
        required: false
        default: "soft"
        type: string
      failover_to_backup:
        description: "Also fail play.tod.galaxxigames.com over to the physical backup machine."
        required: false
        default: true
        type: boolean
      art_version_override:
        description: "Optional art bundle version (e.g. v2) for the backup failover build. Testing only."
        required: false
        default: ""
        type: string
    secrets:
      R2_BUCKET:
        required: true
      R2_ACCOUNT_ID:
        required: true
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true

  workflow_dispatch:
    inputs:
      mode:
        description: "soft = replace with an offline page. hard = delete the site (404)."
        required: true
        default: "soft"
        type: choice
        options:
          - soft
          - hard
      confirm:
        description: "Type UNDEPLOY to confirm. Anything else aborts."
        required: true
        default: ""
        type: string
      failover_to_backup:
        description: "Also fail play.tod.galaxxigames.com over to the physical backup machine."
        required: true
        default: true
        type: boolean
      art_version_override:
        description: "Optional art bundle version (e.g. v2) for the backup failover build. Testing only."
        required: false
        default: ""
        type: string

concurrency:
  group: client-html5-undeploy
  cancel-in-progress: false

jobs:
  guard:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Verify confirmation
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail
          if [ "$CONFIRM" != "UNDEPLOY" ]; then
            echo "::error::Confirmation failed. Type UNDEPLOY exactly to run this workflow."
            exit 1
          fi
          echo "Confirmed: ${{ inputs.mode }} undeploy of GitHub Pages"

  hard-undeploy:
    needs: guard
    if: always() && (needs.guard.result == 'success' || needs.guard.result == 'skipped') && inputs.mode == 'hard'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
    steps:
      - name: Delete GitHub Pages site
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          STATUS="$(curl -s -o /tmp/resp.txt -w '%{http_code}' \
            -X DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")"

          case "$STATUS" in
            204)
              echo "GitHub Pages site deleted. The URL now returns 404."
              {
                echo "## GitHub Pages undeployed (hard)"
                echo
                echo "Site deleted. Re-run **Client HTML5 Pages** to recreate it."
              } >> "$GITHUB_STEP_SUMMARY"
              ;;
            404)
              echo "::notice::No Pages site exists — already undeployed. Nothing to do."
              ;;
            403)
              echo "::error::GITHUB_TOKEN lacks permission to delete the Pages site."
              echo "This endpoint requires repo-admin rights, which the default token may not carry."
              echo "Use mode 'soft' instead, or unpublish manually: Settings > Pages > Unpublish site"
              cat /tmp/resp.txt
              exit 1
              ;;
            *)
              echo "::error::Unexpected response deleting Pages site (HTTP $STATUS)."
              cat /tmp/resp.txt
              exit 1
              ;;
          esac

  soft-undeploy:
    needs: guard
    if: always() && (needs.guard.result == 'success' || needs.guard.result == 'skipped') && inputs.mode == 'soft'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build offline placeholder
        run: |
          set -euo pipefail
          mkdir -p build/offline
          cat > build/offline/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <meta name="robots" content="noindex" />
              <title>Corp Tower — build offline</title>
              <style>
                :root { color-scheme: light dark; }
                body {
                  margin: 0; min-height: 100vh;
                  display: grid; place-items: center;
                  font: 16px/1.6 system-ui, sans-serif;
                  text-align: center; padding: 2rem;
                }
                h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
                p { margin: 0; opacity: .7; }
              </style>
            </head>
            <body>
              <main>
                <h1>Corp Tower is offline</h1>
                <p>This build has been taken down. Check back later.</p>
              </main>
            </body>
          </html>
          EOF
          touch build/offline/.nojekyll
          echo "play.tod.galaxxigames.com" > build/offline/CNAME

      - name: Upload placeholder artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/offline

      - name: Deploy placeholder
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Summarise
        run: |
          {
            echo "## GitHub Pages undeployed (soft)"
            echo
            echo "The game has been replaced with an offline placeholder."
            echo "Re-run **Client HTML5 Pages** to restore the build."
          } >> "$GITHUB_STEP_SUMMARY"

  failover-to-backup:
    needs: [guard, hard-undeploy, soft-undeploy]
    if: |
      always() &&
      inputs.failover_to_backup &&
      (needs.hard-undeploy.result == 'success' || needs.soft-undeploy.result == 'success')
    uses: ./.github/workflows/Client-HTML5-Backup-Deploy.yml
    with:
      expected: undeploy
      art_version_override: ${{ inputs.art_version_override }}
    secrets:
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
