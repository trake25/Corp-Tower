name: Staging Runtime Cleanup

on:
  workflow_dispatch:
    inputs:
      extra_public_ips:
        description: "Optional extra public IPs to clean, separated by spaces, commas, or new lines."
        required: false
        default: ""
        type: string
      remove_images:
        description: "Remove Corp Tower, nginx, and redis Docker images after containers are removed."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      fail_on_ssh_error:
        description: "Fail the workflow when a target cannot be reached by SSH."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1

jobs:
  cleanup:
    name: Clean Staging Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve cleanup targets
        env:
          EXTRA_PUBLIC_IPS_INPUT: ${{ inputs.extra_public_ips }}
        run: |
          set -euo pipefail

          echo "::group::Discovered staging topology"
          aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=corp-tower" \
              "Name=tag:Environment,Values=staging" \
              "Name=tag:Role,Values=gateway-redis-proxy-learning,gateway-redis-proxy-k3s-learning,docker-server-worker" \
              "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[].Instances[].{Name:Tags[?Key==`Name`]|[0].Value,Role:Tags[?Key==`Role`]|[0].Value,State:State.Name,PublicIp:PublicIpAddress,PrivateIp:PrivateIpAddress,SubnetId:SubnetId}' \
            --output table
          echo "::endgroup::"

          DISCOVERED_PUBLIC_IPS="$(
            aws ec2 describe-instances \
              --filters \
                "Name=tag:Project,Values=corp-tower" \
                "Name=tag:Environment,Values=staging" \
                "Name=tag:Role,Values=gateway-redis-proxy-learning,gateway-redis-proxy-k3s-learning,docker-server-worker" \
                "Name=instance-state-name,Values=running" \
              --query 'Reservations[].Instances[].PublicIpAddress' \
              --output text
          )"

          EXTRA_PUBLIC_IPS="$(printf '%s' "$EXTRA_PUBLIC_IPS_INPUT" | tr ',\r\n' '   ')"
          TARGET_PUBLIC_IPS="$(
            printf '%s\n%s\n' "$DISCOVERED_PUBLIC_IPS" "$EXTRA_PUBLIC_IPS" \
              | tr '[:space:]' '\n' \
              | sed '/^$/d' \
              | sort -u \
              | tr '\n' ' '
          )"

          if [ -z "$TARGET_PUBLIC_IPS" ]; then
            echo "No running staging instances or extra public IPs were found."
            exit 1
          fi

          echo "Cleanup target public IPs: $TARGET_PUBLIC_IPS"
          echo "TARGET_PUBLIC_IPS=$TARGET_PUBLIC_IPS" >> "$GITHUB_ENV"

      - name: Clean runtime over SSH
        env:
          EC2_USER: ${{ secrets.EC2_STAGING_USER }}
          EC2_PORT: ${{ secrets.EC2_STAGING_PORT || 22 }}
          EC2_SSH_KEY: ${{ secrets.EC2_STAGING_SSH_KEY }}
          FAIL_ON_SSH_ERROR: ${{ inputs.fail_on_ssh_error }}
          REMOVE_IMAGES: ${{ inputs.remove_images }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          SSH_OPTS=(
            -i ~/.ssh/ec2_key
            -p "$EC2_PORT"
            -o BatchMode=yes
            -o ConnectTimeout=20
            -o ConnectionAttempts=3
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=2
            -o UserKnownHostsFile=~/.ssh/known_hosts
            -o GlobalKnownHostsFile=/dev/null
            -o StrictHostKeyChecking=yes
          )

          prepare_known_host() {
            local host="$1"
            local scan_output=""

            ssh-keygen -R "[$host]:$EC2_PORT" -f ~/.ssh/known_hosts >/dev/null 2>&1 || true
            ssh-keygen -R "$host" -f ~/.ssh/known_hosts >/dev/null 2>&1 || true

            for attempt in $(seq 1 6); do
              scan_output="$(ssh-keyscan -T 10 -p "$EC2_PORT" -H "$host" 2>/dev/null || true)"
              if [ -n "$scan_output" ]; then
                printf '%s\n' "$scan_output" >> ~/.ssh/known_hosts
                return 0
              fi

              echo "Waiting for SSH host key from ${host}:${EC2_PORT} (attempt ${attempt}/6)."
              sleep 5
            done

            echo "::warning::Could not fetch SSH host key from ${host}:${EC2_PORT}."
            return 1
          }

          for TARGET_HOST in $TARGET_PUBLIC_IPS; do
            prepare_known_host "$TARGET_HOST" || true
          done

          UNREACHABLE_HOSTS=""

          for TARGET_HOST in $TARGET_PUBLIC_IPS; do
            echo "::group::Cleanup ${TARGET_HOST}"
            if ! ssh "${SSH_OPTS[@]}" "$EC2_USER@$TARGET_HOST" "hostname && whoami"; then
              echo "::warning::Cannot SSH to ${TARGET_HOST}; skipping host runtime cleanup."
              UNREACHABLE_HOSTS="${UNREACHABLE_HOSTS} ${TARGET_HOST}"
              echo "::endgroup::"
              continue
            fi

            ssh "${SSH_OPTS[@]}" "$EC2_USER@$TARGET_HOST" \
              "REMOVE_IMAGES='$REMOVE_IMAGES' bash -s" <<'REMOTE_CLEANUP'
          set -euxo pipefail

          sudo -n true

          if command -v docker >/dev/null 2>&1; then
            sudo systemctl start docker 2>/dev/null || true

            CONTAINER_IDS="$(sudo docker ps -aq --filter name=corp-tower || true)"
            if [ -n "$CONTAINER_IDS" ]; then
              sudo docker stop $CONTAINER_IDS 2>/dev/null || true
              sudo docker rm -f $CONTAINER_IDS 2>/dev/null || true
            fi

            sudo docker network rm corp-tower-gateway 2>/dev/null || true

            if [ "$REMOVE_IMAGES" = "true" ]; then
              IMAGE_IDS="$(
                sudo docker images --format '{{.Repository}} {{.Tag}} {{.ID}}' \
                  | awk '$1 ~ /corp-tower-server/ || $1 == "nginx" || $1 == "redis" {print $3}' \
                  | sort -u
              )"

              if [ -n "$IMAGE_IDS" ]; then
                sudo docker rmi -f $IMAGE_IDS 2>/dev/null || true
              fi

              sudo docker image prune -f 2>/dev/null || true
            fi
          fi

          for CLEANUP_PATH in \
            /tmp/corp-tower-nginx.conf \
            /tmp/corp-tower-server.yaml \
            /tmp/corp-tower-server.rendered.yaml \
            /tmp/corp-tower-ecr-password
          do
            sudo rm -rf "$CLEANUP_PATH" 2>/dev/null || true
          done
          if command -v docker >/dev/null 2>&1; then
            sudo docker ps -a --filter name=corp-tower
          fi
          REMOTE_CLEANUP
            echo "::endgroup::"
          done

          if [ -n "$UNREACHABLE_HOSTS" ]; then
            echo "::warning::Unreachable SSH targets:${UNREACHABLE_HOSTS}"
            if [ "$FAIL_ON_SSH_ERROR" = "true" ]; then
              exit 1
            fi
          fi
