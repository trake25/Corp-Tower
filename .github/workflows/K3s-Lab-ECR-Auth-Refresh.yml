name: K3s Lab ECR Auth Refresh

on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1

jobs:
  refresh:
    name: Refresh K3s ECR Pull Secret
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: staging

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Resolve running K3s lab gateway and control plane
        run: |
          set -euo pipefail

          GATEWAY_PUBLIC_IP="$(
            aws ec2 describe-instances \
              --filters \
                "Name=tag:Project,Values=corp-tower" \
                "Name=tag:Environment,Values=k3s-lab" \
                "Name=tag:Role,Values=k3s-gateway" \
                "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].PublicIpAddress' \
              --output text
          )"

          CONTROL_PLANE_PRIVATE_IP="$(
            aws ec2 describe-instances \
              --filters \
                "Name=tag:Project,Values=corp-tower" \
                "Name=tag:Environment,Values=k3s-lab" \
                "Name=tag:Role,Values=k3s-control-plane" \
                "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].PrivateIpAddress' \
              --output text
          )"

          if [ -z "$GATEWAY_PUBLIC_IP" ] || [ "$GATEWAY_PUBLIC_IP" = "None" ] || [ -z "$CONTROL_PLANE_PRIVATE_IP" ] || [ "$CONTROL_PLANE_PRIVATE_IP" = "None" ]; then
            echo "No running K3s lab gateway/control plane found; skipping scheduled refresh."
            echo "SKIP_REFRESH=true" >> "$GITHUB_ENV"
            exit 0
          fi

          {
            echo "GATEWAY_PUBLIC_IP=$GATEWAY_PUBLIC_IP"
            echo "CONTROL_PLANE_PRIVATE_IP=$CONTROL_PLANE_PRIVATE_IP"
            echo "SKIP_REFRESH=false"
          } >> "$GITHUB_ENV"

      - name: Prepare SSH tunnel and kubeconfig
        env:
          EC2_USER: ${{ secrets.EC2_STAGING_USER }}
          EC2_PORT: ${{ secrets.EC2_STAGING_PORT || 22 }}
          EC2_SSH_KEY: ${{ secrets.EC2_STAGING_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ "${SKIP_REFRESH:-false}" = "true" ]; then
            echo "Skipping kubeconfig setup because the K3s lab is not running."
            exit 0
          fi

          mkdir -p ~/.ssh "$RUNNER_TEMP/corp-tower-k3s"
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          ssh-keyscan -T 10 -p "$EC2_PORT" -H "$GATEWAY_PUBLIC_IP" >> ~/.ssh/known_hosts

          SSH_OPTS=(
            -i ~/.ssh/ec2_key
            -p "$EC2_PORT"
            -o BatchMode=yes
            -o ConnectTimeout=20
            -o ExitOnForwardFailure=yes
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=2
            -o UserKnownHostsFile=~/.ssh/known_hosts
            -o GlobalKnownHostsFile=/dev/null
            -o StrictHostKeyChecking=yes
          )

          scan_output="$(
            ssh "${SSH_OPTS[@]}" "$EC2_USER@$GATEWAY_PUBLIC_IP" \
              "ssh-keyscan -T 10 -p '$EC2_PORT' -H '$CONTROL_PLANE_PRIVATE_IP' 2>/dev/null" || true
          )"
          printf '%s\n' "$scan_output" >> ~/.ssh/known_hosts

          KUBE_API_PORT=16443
          KUBECONFIG_PATH="$RUNNER_TEMP/corp-tower-k3s/kubeconfig"

          ssh "${SSH_OPTS[@]}" \
            -f -N \
            -L "${KUBE_API_PORT}:${CONTROL_PLANE_PRIVATE_IP}:6443" \
            "$EC2_USER@$GATEWAY_PUBLIC_IP"

          PROXY_COMMAND="ssh -i $HOME/.ssh/ec2_key -p $EC2_PORT -o BatchMode=yes -o ConnectTimeout=20 -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o GlobalKnownHostsFile=/dev/null -o StrictHostKeyChecking=yes -W %h:%p $EC2_USER@$GATEWAY_PUBLIC_IP"

          ssh "${SSH_OPTS[@]}" \
            -o "ProxyCommand=$PROXY_COMMAND" \
            "$EC2_USER@$CONTROL_PLANE_PRIVATE_IP" \
            "sudo cat /etc/rancher/k3s/k3s.yaml" > "$KUBECONFIG_PATH"

          sed -i "s#https://127.0.0.1:6443#https://127.0.0.1:${KUBE_API_PORT}#g" "$KUBECONFIG_PATH"
          chmod 600 "$KUBECONFIG_PATH"
          echo "KUBECONFIG=$KUBECONFIG_PATH" >> "$GITHUB_ENV"

      - name: Refresh ecr-pull secret
        run: |
          set -euo pipefail

          if [ "${SKIP_REFRESH:-false}" = "true" ]; then
            echo "Skipping ECR pull secret refresh because the K3s lab is not running."
            exit 0
          fi

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          ECR_PASSWORD="$(aws ecr get-login-password --region "$AWS_REGION")"

          kubectl create namespace corp-tower --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n corp-tower create secret docker-registry ecr-pull \
            --docker-server="$ECR_REGISTRY" \
            --docker-username=AWS \
            --docker-password="$ECR_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n corp-tower get secret ecr-pull
