name: Staging Automated Master

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/Server/**"
      - "infra/ansible/**"
      - "infra/terraform/**"
      - ".github/workflows/Staging-Automated-Master.yml"
      - ".github/workflows/Staging-Diagnostics.yml"
      - ".github/workflows/Staging-Infra-Plan.yml"
      - ".github/workflows/Server-Staging-Deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Preflight level for manual staging runs."
        required: true
        default: "full_preflight"
        type: choice
        options:
          - full_preflight
          - fast_server_deploy
          - infra_plan_only
      extra_public_ips:
        description: "Optional public IPs for diagnostics, separated by spaces, commas, or new lines."
        required: false
        default: ""
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: staging-automated-master-${{ github.ref }}
  cancel-in-progress: false

jobs:
  classify-changes:
    name: Classify Changes
    runs-on: ubuntu-24.04
    outputs:
      run_diagnostics: ${{ steps.classify.outputs.run_diagnostics }}
      run_infra_plan: ${{ steps.classify.outputs.run_infra_plan }}
      run_server_update: ${{ steps.classify.outputs.run_server_update }}
      fast_server_update: ${{ steps.classify.outputs.fast_server_update }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify staging path changes
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          DEPLOY_MODE: ${{ inputs.deploy_mode || '' }}
        run: |
          set -euo pipefail

          run_diagnostics=false
          run_infra_plan=false
          run_server_update=false
          fast_server_update=false
          changed_paths=""

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            case "$DEPLOY_MODE" in
              fast_server_deploy)
                run_server_update=true
                fast_server_update=true
                ;;
              infra_plan_only)
                run_infra_plan=true
                ;;
              full_preflight|"")
                run_diagnostics=true
                run_infra_plan=true
                run_server_update=true
                ;;
              *)
                echo "::error::Unknown deploy_mode: $DEPLOY_MODE"
                exit 1
                ;;
            esac
          else
            if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              changed_paths="$(git diff-tree --no-commit-id --name-only -r "$AFTER_SHA")"
            else
              changed_paths="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"
            fi

            if printf '%s\n' "$changed_paths" | grep -Eq '^src/Server/'; then
              run_server_update=true
              fast_server_update=true
            fi

            if printf '%s\n' "$changed_paths" | grep -Eq '^infra/ansible/'; then
              run_diagnostics=true
              run_server_update=true
              fast_server_update=false
            fi

            if printf '%s\n' "$changed_paths" | grep -Eq '^infra/terraform/'; then
              run_infra_plan=true
              fast_server_update=false
            fi

            if printf '%s\n' "$changed_paths" | grep -Eq '^\.github/workflows/(Staging-Automated-Master|Staging-Diagnostics|Staging-Infra-Plan|Server-Staging-Deploy)\.yml$'; then
              run_diagnostics=true
              run_infra_plan=true
              fast_server_update=false
            fi
          fi

          {
            echo "run_diagnostics=$run_diagnostics"
            echo "run_infra_plan=$run_infra_plan"
            echo "run_server_update=$run_server_update"
            echo "fast_server_update=$fast_server_update"
            echo "changed_paths<<EOF"
            printf '%s\n' "$changed_paths"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Staging automated master classification"
            echo
            echo "- Diagnostics: \`$run_diagnostics\`"
            echo "- Infra plan: \`$run_infra_plan\`"
            echo "- Server update: \`$run_server_update\`"
            echo "- Fast server update: \`$fast_server_update\`"
            if [ -n "$changed_paths" ]; then
              echo
              echo "### Changed paths"
              printf '%s\n' "$changed_paths" | sed 's/^/- /'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  diagnostics:
    name: Diagnostics
    needs: classify-changes
    if: ${{ needs.classify-changes.outputs.run_diagnostics == 'true' }}
    uses: ./.github/workflows/Staging-Diagnostics.yml
    with:
      extra_public_ips: ${{ github.event_name == 'workflow_dispatch' && inputs.extra_public_ips || '' }}
    secrets: inherit

  infra-plan:
    name: Infra Plan
    needs:
      - classify-changes
      - diagnostics
    if: ${{ always() && needs.classify-changes.outputs.run_infra_plan == 'true' && (needs.diagnostics.result == 'success' || needs.diagnostics.result == 'skipped') }}
    uses: ./.github/workflows/Staging-Infra-Plan.yml
    secrets: inherit

  server-update-fast:
    name: Server Update Fast
    needs: classify-changes
    if: ${{ needs.classify-changes.outputs.run_server_update == 'true' && needs.classify-changes.outputs.fast_server_update == 'true' }}
    uses: ./.github/workflows/Server-Staging-Deploy.yml
    secrets: inherit

  server-update-after-preflight:
    name: Server Update After Preflight
    needs:
      - classify-changes
      - diagnostics
      - infra-plan
    if: ${{ always() && needs.classify-changes.outputs.run_server_update == 'true' && needs.classify-changes.outputs.fast_server_update != 'true' && (needs.diagnostics.result == 'success' || needs.diagnostics.result == 'skipped') && (needs.infra-plan.result == 'success' || needs.infra-plan.result == 'skipped') }}
    uses: ./.github/workflows/Server-Staging-Deploy.yml
    secrets: inherit
