name: Staging Automated Master

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/Server/**"
      - ".github/workflows/Staging-Automated-Master.yml"
      - ".github/workflows/Staging-Diagnostics.yml"
      - ".github/workflows/Staging-Infra-Plan.yml"
      - ".github/workflows/Server-Staging-Deploy.yml"
  workflow_dispatch:
    inputs:
      extra_public_ips:
        description: "Optional public IPs for diagnostics, separated by spaces, commas, or new lines."
        required: false
        default: ""
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: staging-automated-master-${{ github.ref }}
  cancel-in-progress: false

jobs:
  diagnostics:
    name: Diagnostics
    uses: ./.github/workflows/Staging-Diagnostics.yml
    with:
      extra_public_ips: ${{ github.event_name == 'workflow_dispatch' && inputs.extra_public_ips || '' }}
    secrets: inherit

  infra-plan:
    name: Infra Plan
    needs: diagnostics
    uses: ./.github/workflows/Staging-Infra-Plan.yml
    secrets: inherit

  server-update:
    name: Server Update
    needs: infra-plan
    uses: ./.github/workflows/Server-Staging-Deploy.yml
    secrets: inherit
