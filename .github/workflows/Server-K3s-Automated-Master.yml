name: Server K3s Automated Master

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/Server/**"
      - "infra/k3s/ansible/**"
      - "infra/k3s/apps/**"
      - "infra/k3s/terraform/**"
      - ".github/workflows/Server-K3s-Automated-Master.yml"
      - ".github/workflows/Server-K3s-Diagnostics.yml"
      - ".github/workflows/Server-K3s-Infra-Plan.yml"
      - ".github/workflows/Server-K3s-Deploy.yml"
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Preflight level for manual Server K3s runs."
        required: true
        default: "full_preflight"
        type: choice
        options:
          - full_preflight
          - fast_server_deploy
          - infra_plan_only

permissions:
  id-token: write
  contents: read

concurrency:
  group: server-k3s-automated-master-${{ github.ref }}
  cancel-in-progress: false

jobs:
  classify-changes:
    name: Classify Changes
    runs-on: ubuntu-24.04
    outputs:
      run_diagnostics: ${{ steps.classify.outputs.run_diagnostics }}
      run_infra_plan: ${{ steps.classify.outputs.run_infra_plan }}
      run_k3s_deploy: ${{ steps.classify.outputs.run_k3s_deploy }}
      fast_k3s_deploy: ${{ steps.classify.outputs.fast_k3s_deploy }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Classify Server K3s path changes
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          DEPLOY_MODE: ${{ inputs.deploy_mode || '' }}
        run: |
          set -euo pipefail

          run_diagnostics=false
          run_infra_plan=false
          run_k3s_deploy=false
          fast_k3s_deploy=false
          changed_paths=""

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            case "$DEPLOY_MODE" in
              fast_server_deploy)
                run_k3s_deploy=true
                fast_k3s_deploy=true
                ;;
              infra_plan_only)
                run_infra_plan=true
                ;;
              full_preflight|"")
                run_diagnostics=true
                run_infra_plan=true
                run_k3s_deploy=true
                ;;
              *)
                echo "::error::Unknown deploy_mode: $DEPLOY_MODE"
                exit 1
                ;;
            esac
          else
            if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              changed_paths="$(git diff-tree --no-commit-id --name-only -r "$AFTER_SHA")"
            else
              changed_paths="$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")"
            fi

            if printf '%s\n' "$changed_paths" | grep -Eq '^src/Server/|^infra/k3s/apps/'; then
              run_k3s_deploy=true
              fast_k3s_deploy=true
            fi

            if printf '%s\n' "$changed_paths" | grep -Eq '^infra/k3s/ansible/'; then
              run_diagnostics=true
              run_k3s_deploy=true
              fast_k3s_deploy=false
            fi

            if printf '%s\n' "$changed_paths" | grep -Eq '^infra/k3s/terraform/'; then
              run_infra_plan=true
              fast_k3s_deploy=false
            fi

            if printf '%s\n' "$changed_paths" | grep -Eq '^\.github/workflows/(Server-K3s-Automated-Master|Server-K3s-Diagnostics|Server-K3s-Infra-Plan|Server-K3s-Deploy)\.yml$'; then
              run_diagnostics=true
              run_infra_plan=true
              fast_k3s_deploy=false
            fi
          fi

          {
            echo "run_diagnostics=$run_diagnostics"
            echo "run_infra_plan=$run_infra_plan"
            echo "run_k3s_deploy=$run_k3s_deploy"
            echo "fast_k3s_deploy=$fast_k3s_deploy"
            echo "changed_paths<<EOF"
            printf '%s\n' "$changed_paths"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Server K3s automated master classification"
            echo
            echo "- Diagnostics: \`$run_diagnostics\`"
            echo "- Infra plan: \`$run_infra_plan\`"
            echo "- K3s deploy: \`$run_k3s_deploy\`"
            echo "- Fast K3s deploy: \`$fast_k3s_deploy\`"
            if [ -n "$changed_paths" ]; then
              echo
              echo "### Changed paths"
              printf '%s\n' "$changed_paths" | sed 's/^/- /'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  diagnostics:
    name: Diagnostics
    needs: classify-changes
    if: ${{ needs.classify-changes.outputs.run_diagnostics == 'true' }}
    uses: ./.github/workflows/Server-K3s-Diagnostics.yml
    secrets: inherit

  infra-plan:
    name: Infra Plan
    needs:
      - classify-changes
      - diagnostics
    if: ${{ always() && needs.classify-changes.outputs.run_infra_plan == 'true' && (needs.diagnostics.result == 'success' || needs.diagnostics.result == 'skipped') }}
    uses: ./.github/workflows/Server-K3s-Infra-Plan.yml
    secrets: inherit

  check-k3s-status:
    name: Check K3s Stack Status
    needs: classify-changes
    if: ${{ needs.classify-changes.outputs.run_k3s_deploy == 'true' && needs.classify-changes.outputs.fast_k3s_deploy == 'true' }}
    runs-on: ubuntu-24.04
    outputs:
      k3s_up: ${{ steps.check.outputs.k3s_up }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Check for a running K3s control plane
        id: check
        run: |
          set -euo pipefail
          count="$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=corp-tower" \
              "Name=tag:Environment,Values=k3s-lab" \
              "Name=tag:Role,Values=k3s-control-plane" \
              "Name=instance-state-name,Values=running" \
            --query 'length(Reservations[].Instances[])' \
            --output text)"

          if [ "$count" = "1" ]; then
            echo "k3s_up=true" >> "$GITHUB_OUTPUT"
            echo "K3s control plane is up." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "k3s_up=false" >> "$GITHUB_OUTPUT"
            echo "K3s control plane is not up (found $count running)." >> "$GITHUB_STEP_SUMMARY"
          fi

  check-backup-status:
    name: Check Physical Backup Server Status
    needs: [classify-changes, check-k3s-status]
    if: |
      always() &&
      needs.classify-changes.outputs.run_k3s_deploy == 'true' &&
      needs.classify-changes.outputs.fast_k3s_deploy == 'true' &&
      needs.check-k3s-status.outputs.k3s_up != 'true'
    runs-on: [self-hosted, backup]
    timeout-minutes: 5
    outputs:
      backup_up: ${{ steps.check.outputs.backup_up }}
    steps:
      - name: Check for a running backup server container
        id: check
        run: |
          set -euo pipefail
          if docker ps --filter "name=corp-tower-server" --filter "status=running" --format '{{.Names}}' | grep -q .; then
            echo "backup_up=true" >> "$GITHUB_OUTPUT"
          else
            echo "backup_up=false" >> "$GITHUB_OUTPUT"
          fi

  k3s-deploy-fast:
    name: K3s Deploy Fast
    needs: [classify-changes, check-k3s-status]
    if: ${{ needs.classify-changes.outputs.run_k3s_deploy == 'true' && needs.classify-changes.outputs.fast_k3s_deploy == 'true' && needs.check-k3s-status.outputs.k3s_up == 'true' }}
    uses: ./.github/workflows/Server-K3s-Deploy.yml
    secrets: inherit

  backup-deploy-fast:
    name: Backup Server Deploy (K3s Down Fallback)
    needs: [classify-changes, check-k3s-status, check-backup-status]
    if: |
      always() &&
      needs.classify-changes.outputs.run_k3s_deploy == 'true' &&
      needs.classify-changes.outputs.fast_k3s_deploy == 'true' &&
      needs.check-k3s-status.outputs.k3s_up != 'true' &&
      needs.check-backup-status.outputs.backup_up == 'true'
    uses: ./.github/workflows/Server-Backup-Deploy.yml

  fast-deploy-unavailable:
    name: Fast Deploy Target Unavailable
    needs: [classify-changes, check-k3s-status, check-backup-status]
    if: |
      always() &&
      needs.classify-changes.outputs.run_k3s_deploy == 'true' &&
      needs.classify-changes.outputs.fast_k3s_deploy == 'true' &&
      needs.check-k3s-status.outputs.k3s_up != 'true' &&
      needs.check-backup-status.outputs.backup_up != 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Fail loudly — no deploy target is up
        run: |
          echo "::error::Neither the K3s stack nor the physical backup server is up — nothing to fast-deploy to."
          echo "Bring one up first: 'Server K3s Automated Master' (full_preflight) to restore K3s, or dispatch 'Server Backup Deploy' directly for the physical machine."
          exit 1

  k3s-deploy-after-preflight:
    name: K3s Deploy After Preflight
    needs:
      - classify-changes
      - diagnostics
      - infra-plan
    if: ${{ always() && needs.classify-changes.outputs.run_k3s_deploy == 'true' && needs.classify-changes.outputs.fast_k3s_deploy != 'true' && (needs.diagnostics.result == 'success' || needs.diagnostics.result == 'skipped') && (needs.infra-plan.result == 'success' || needs.infra-plan.result == 'skipped') }}
    uses: ./.github/workflows/Server-K3s-Deploy.yml
    secrets: inherit
