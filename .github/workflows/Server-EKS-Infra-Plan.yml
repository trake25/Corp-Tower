name: Server EKS Infra Plan

on:
  workflow_dispatch:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  TF_VAR_aws_region: ap-southeast-1
  TF_VAR_environment: eks-lab
  TF_VAR_ecr_repository_name: ${{ secrets.ECR_REPOSITORY }}

jobs:
  plan:
    name: Plan Server EKS Infrastructure
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup AWS credentials and Terraform
        uses: ./.github/actions/aws-terraform-setup
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure Terraform backend bucket exists
        uses: ./.github/actions/terraform-backend-bootstrap
        with:
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform validate and plan
        uses: ./.github/actions/terraform-validate-plan
        with:
          working-directory: infra/eks/terraform
