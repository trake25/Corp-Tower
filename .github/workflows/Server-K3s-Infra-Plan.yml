name: Server K3s Infra Plan

on:
  workflow_dispatch:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  TF_VAR_aws_region: ap-southeast-1
  TF_VAR_environment: k3s-lab
  TF_VAR_ssh_public_key: ${{ secrets.EC2_STAGING_SSH_PUBLIC_KEY }}
  TF_VAR_ssh_cidr: ${{ secrets.STAGING_SSH_CIDR || '0.0.0.0/0' }}
  TF_VAR_game_port_cidr: ${{ secrets.STAGING_GAME_PORT_CIDR || '0.0.0.0/0' }}
  TF_VAR_ecr_repository_name: ${{ secrets.ECR_REPOSITORY }}

jobs:
  plan:
    name: Plan Server K3s Infrastructure
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    environment: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup AWS credentials and Terraform
        uses: ./.github/actions/aws-terraform-setup
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve SSH public key for Terraform
        uses: ./.github/actions/resolve-ssh-key
        with:
          ssh-private-key: ${{ secrets.EC2_STAGING_SSH_KEY }}

      - name: Ensure Terraform backend bucket exists
        uses: ./.github/actions/terraform-backend-bootstrap
        with:
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform validate and plan
        uses: ./.github/actions/terraform-validate-plan
        with:
          working-directory: infra/k3s/terraform
