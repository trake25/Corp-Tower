name: Client HTML5 Cloudflare Pages

# Manual only. Builds the web export in Actions and pushes the finished folder
# to Cloudflare Pages via Direct Upload.
#
# Why Direct Upload rather than Cloudflare's Git integration: Cloudflare's build
# runners have no Godot toolchain, cap builds at 20 minutes, cannot build the
# Android target, and would bypass the GUT/smoke-test gates that live here.
# Building once in Actions keeps a single validated pipeline for all targets.
#
# Cost note: Cloudflare Pages bandwidth is unlimited on the free plan and R2
# egress is always free. Do NOT enable Pages Functions — those bill against
# Workers quotas. See docs/private-assets-setup.md for all cost tripwires.

on:
  workflow_dispatch:
    inputs:
      art_version_override:
        description: "Optional art bundle version (e.g. v2) to fetch instead of the pinned manifest. Skips sha256 verification — testing only, never for release."
        required: false
        default: ""
        type: string
      deploy_branch:
        description: "Cloudflare Pages branch. 'main' publishes to production; anything else creates a preview deployment."
        required: true
        default: "main"
        type: string

permissions:
  contents: read

concurrency:
  group: client-html5-cloudflare
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04

    env:
      GODOT_VERSION: "4.6.2"
      GODOT_STATUS: "stable"
      GODOT_PROJECT_PATH: "src/Client/App/corp-tower"
      CF_PAGES_PROJECT: "corp-tower"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch private art assets
        uses: ./.github/actions/fetch-private-assets
        with:
          manifest-path: src/Client/App/corp-tower/Cor/art-manifest.json
          dest-path: src/Client/App/corp-tower/Cor/Art
          bucket: ${{ secrets.R2_BUCKET }}
          account-id: ${{ secrets.R2_ACCOUNT_ID }}
          access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          version-override: ${{ inputs.art_version_override }}

      # enforce-max-file-mib: 25 fails here with an explanatory message rather
      # than letting wrangler reject the upload with an opaque error.
      - name: Build web export
        id: build
        uses: ./.github/actions/build-godot-web
        with:
          godot-version: ${{ env.GODOT_VERSION }}
          godot-status: ${{ env.GODOT_STATUS }}
          project-path: ${{ env.GODOT_PROJECT_PATH }}
          output-dir: ${{ github.workspace }}/build/web
          preset-config: .github/godot/export_presets.web.ci.cfg
          emit-headers: "true"
          enforce-max-file-mib: "25"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy build/web
            --project-name=${{ env.CF_PAGES_PROJECT }}
            --branch=${{ inputs.deploy_branch }}
            --commit-dirty=true

      - name: Summarise deployment
        run: |
          set -euo pipefail
          {
            echo "## Cloudflare Pages deployment"
            echo
            echo "- Project: \`${CF_PAGES_PROJECT}\`"
            echo "- Branch: \`${{ inputs.deploy_branch }}\`"
            echo "- Largest file: \`${{ steps.build.outputs.largest-file-name }}\`"
            echo "- COOP/COEP headers: emitted"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remove private assets from runner
        if: always()
        run: rm -rf "$GODOT_PROJECT_PATH/Cor/Art"
