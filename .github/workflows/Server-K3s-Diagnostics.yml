name: Server K3s Diagnostics

on:
  workflow_dispatch:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  DUCKDNS_FQDN: corp-tower.duckdns.org

jobs:
  diagnostics:
    name: Diagnose Server K3s
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: staging

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Show AWS topology
        run: |
          set -euo pipefail

          echo "::group::Server K3s instances"
          aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=corp-tower" \
              "Name=tag:Environment,Values=k3s-lab" \
              "Name=tag:Role,Values=k3s-gateway,k3s-control-plane,k3s-agent" \
              "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[].Instances[].{InstanceId:InstanceId,Name:Tags[?Key==`Name`]|[0].Value,Role:Tags[?Key==`Role`]|[0].Value,State:State.Name,PublicIp:PublicIpAddress,PrivateIp:PrivateIpAddress,SubnetId:SubnetId,VpcId:VpcId,SecurityGroups:SecurityGroups[].GroupId}' \
            --output table
          echo "::endgroup::"

          echo "::group::Server K3s security groups"
          SECURITY_GROUP_IDS="$(
            aws ec2 describe-security-groups \
              --filters \
                "Name=tag:Project,Values=corp-tower" \
                "Name=tag:Environment,Values=k3s-lab" \
              --query 'SecurityGroups[].GroupId' \
              --output text
          )"

          for SECURITY_GROUP_ID in $SECURITY_GROUP_IDS; do
            echo "Security group: ${SECURITY_GROUP_ID}"
            aws ec2 describe-security-group-rules \
              --filters "Name=group-id,Values=${SECURITY_GROUP_ID}" \
              --query 'SecurityGroupRules[?IsEgress==`false`].{RuleId:SecurityGroupRuleId,Protocol:IpProtocol,From:FromPort,To:ToPort,Cidr:CidrIpv4,ReferencedGroup:ReferencedGroupInfo.GroupId,Description:Description}' \
              --output table
          done
          echo "::endgroup::"

          echo "::group::Server K3s route tables"
          VPC_ID="$(
            aws ec2 describe-vpcs \
              --filters \
                "Name=tag:Project,Values=corp-tower" \
                "Name=tag:Environment,Values=k3s-lab" \
              --query 'Vpcs[0].VpcId' \
              --output text
          )"

          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            aws ec2 describe-route-tables \
              --filters "Name=vpc-id,Values=${VPC_ID}" \
              --query 'RouteTables[].{RouteTableId:RouteTableId,Associations:Associations[].SubnetId,Routes:Routes[].{Destination:DestinationCidrBlock,Gateway:GatewayId,NetworkInterface:NetworkInterfaceId,State:State}}' \
              --output json
          fi
          echo "::endgroup::"

      - name: Verify DuckDNS points at K3s gateway
        run: |
          set -euo pipefail

          GATEWAY_PUBLIC_IP="$(
            aws ec2 describe-instances \
              --filters \
                "Name=tag:Project,Values=corp-tower" \
                "Name=tag:Environment,Values=k3s-lab" \
                "Name=tag:Role,Values=k3s-gateway" \
                "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].PublicIpAddress' \
              --output text
          )"

          if [ -z "$GATEWAY_PUBLIC_IP" ] || [ "$GATEWAY_PUBLIC_IP" = "None" ]; then
            echo "::error::No running Server K3s gateway found for DuckDNS ownership check."
            exit 1
          fi

          resolved_ip=""
          for attempt in $(seq 1 10); do
            resolved_ip="$(
              getent ahostsv4 "$DUCKDNS_FQDN" \
                | awk '{ print $1; exit }' \
                || true
            )"

            if [ "$resolved_ip" = "$GATEWAY_PUBLIC_IP" ]; then
              echo "${DUCKDNS_FQDN} resolves to K3s gateway ${GATEWAY_PUBLIC_IP}."
              exit 0
            fi

            echo "Waiting for ${DUCKDNS_FQDN} to resolve to ${GATEWAY_PUBLIC_IP}; current: ${resolved_ip:-none} (attempt ${attempt}/10)."
            sleep 2
          done

          echo "::error::${DUCKDNS_FQDN} resolves to ${resolved_ip:-none}, expected K3s gateway ${GATEWAY_PUBLIC_IP}."
          exit 1

      - name: Probe SSH through bastion
        env:
          EC2_USER: ${{ secrets.EC2_STAGING_USER }}
          EC2_PORT: ${{ secrets.EC2_STAGING_PORT || 22 }}
          EC2_SSH_KEY: ${{ secrets.EC2_STAGING_SSH_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          GATEWAY_PUBLIC_IP="$(
            aws ec2 describe-instances \
              --filters \
                "Name=tag:Project,Values=corp-tower" \
                "Name=tag:Environment,Values=k3s-lab" \
                "Name=tag:Role,Values=k3s-gateway" \
                "Name=instance-state-name,Values=running" \
              --query 'Reservations[0].Instances[0].PublicIpAddress' \
              --output text
          )"

          if [ -z "$GATEWAY_PUBLIC_IP" ] || [ "$GATEWAY_PUBLIC_IP" = "None" ]; then
            echo "::warning::No running Server K3s gateway found; skipping SSH probes."
            exit 0
          fi

          K3S_PRIVATE_IPS="$(
            aws ec2 describe-instances \
              --filters \
                "Name=tag:Project,Values=corp-tower" \
                "Name=tag:Environment,Values=k3s-lab" \
                "Name=tag:Role,Values=k3s-control-plane,k3s-agent" \
                "Name=instance-state-name,Values=running" \
              --query 'Reservations[].Instances[].PrivateIpAddress' \
              --output text
          )"

          SSH_OPTS=(
            -i ~/.ssh/ec2_key
            -p "$EC2_PORT"
            -o BatchMode=yes
            -o ConnectTimeout=20
            -o ConnectionAttempts=3
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=2
            -o UserKnownHostsFile=~/.ssh/known_hosts
            -o GlobalKnownHostsFile=/dev/null
            -o StrictHostKeyChecking=yes
          )

          ssh-keygen -R "[$GATEWAY_PUBLIC_IP]:$EC2_PORT" -f ~/.ssh/known_hosts >/dev/null 2>&1 || true
          ssh-keyscan -T 10 -p "$EC2_PORT" -H "$GATEWAY_PUBLIC_IP" >> ~/.ssh/known_hosts

          ssh "${SSH_OPTS[@]}" "$EC2_USER@$GATEWAY_PUBLIC_IP" "hostname && whoami"

          PROXY_COMMAND="ssh -i $HOME/.ssh/ec2_key -p $EC2_PORT -o BatchMode=yes -o ConnectTimeout=20 -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o GlobalKnownHostsFile=/dev/null -o StrictHostKeyChecking=yes -W %h:%p $EC2_USER@$GATEWAY_PUBLIC_IP"

          for PRIVATE_IP in $K3S_PRIVATE_IPS; do
            scan_output="$(
              ssh "${SSH_OPTS[@]}" "$EC2_USER@$GATEWAY_PUBLIC_IP" \
                "ssh-keyscan -T 10 -p '$EC2_PORT' -H '$PRIVATE_IP' 2>/dev/null" || true
            )"

            if [ -n "$scan_output" ]; then
              printf '%s\n' "$scan_output" >> ~/.ssh/known_hosts
            fi

            ssh "${SSH_OPTS[@]}" \
              -o "ProxyCommand=$PROXY_COMMAND" \
              "$EC2_USER@$PRIVATE_IP" \
              "hostname && whoami"
          done
