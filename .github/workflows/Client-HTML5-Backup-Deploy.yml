name: Client HTML5 Backup Deploy

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/Client/**"
      - ".github/actions/build-godot-web/**"
      - ".github/actions/fetch-private-assets/**"
      - ".github/godot/export_presets.web.ci.cfg"
      - ".github/workflows/Client-HTML5-Backup-Deploy.yml"

  workflow_call:
    inputs:
      art_version_override:
        description: "Optional art bundle version (e.g. v2) to fetch instead of the pinned manifest. Skips sha256 verification — testing only, never for release."
        required: false
        default: ""
        type: string
    secrets:
      R2_BUCKET:
        required: true
      R2_ACCOUNT_ID:
        required: true
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true

  workflow_dispatch:
    inputs:
      art_version_override:
        description: "Optional art bundle version (e.g. v2) to fetch instead of the pinned manifest. Skips sha256 verification — testing only, never for release."
        required: false
        default: ""
        type: string

concurrency:
  group: client-html5-web-backup
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      GODOT_VERSION: "4.6.2"
      GODOT_STATUS: "stable"
      GODOT_PROJECT_PATH: "src/Client/App/corp-tower"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch private art assets
        uses: ./.github/actions/fetch-private-assets
        with:
          manifest-path: src/Client/App/corp-tower/Cor/art-manifest.json
          dest-path: src/Client/App/corp-tower/Cor/Art
          bucket: ${{ secrets.R2_BUCKET }}
          account-id: ${{ secrets.R2_ACCOUNT_ID }}
          access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          version-override: ${{ inputs.art_version_override }}

      - name: Build web export
        uses: ./.github/actions/build-godot-web
        with:
          godot-version: ${{ env.GODOT_VERSION }}
          godot-status: ${{ env.GODOT_STATUS }}
          project-path: ${{ env.GODOT_PROJECT_PATH }}
          output-dir: ${{ github.workspace }}/build/web
          preset-config: .github/godot/export_presets.web.ci.cfg

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          retention-days: 7

      - name: Remove private assets from runner
        if: always()
        run: rm -rf "$GODOT_PROJECT_PATH/Cor/Art"

  deploy-to-backup:
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: [self-hosted, backup]
    timeout-minutes: 15

    steps:
      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Deploy to backup machine
        run: "$HOME/corp-tower-server-backup/web-backup-up.sh"
        env:
          CORP_TOWER_WEB_BUILD_DIR: ${{ github.workspace }}/build/web
          CORP_TOWER_WEB_BUILD_SHA: ${{ github.sha }}
