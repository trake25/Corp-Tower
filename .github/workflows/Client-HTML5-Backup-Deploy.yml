name: Client HTML5 Backup Deploy

on:
  workflow_call:
    inputs:
      art_version_override:
        description: "Optional art bundle version (e.g. v2) to fetch instead of the pinned manifest. Skips sha256 verification — testing only, never for release."
        required: false
        default: ""
        type: string
      expected:
        description: "'undeploy' when called automatically after GitHub Pages was just undeployed (skips the healthy-site warning); 'manual' otherwise."
        required: false
        default: "manual"
        type: string
      invoked_via_call:
        description: "Internal marker — always true here. Lets the guard job tell a reusable workflow_call apart from a direct workflow_dispatch, since github.event_name reflects the top-level run's trigger even when nested, not this workflow's own invocation."
        required: false
        default: true
        type: boolean
    secrets:
      R2_BUCKET:
        required: true
      R2_ACCOUNT_ID:
        required: true
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true

  workflow_dispatch:
    inputs:
      art_version_override:
        description: "Optional art bundle version (e.g. v2) to fetch instead of the pinned manifest. Skips sha256 verification — testing only, never for release."
        required: false
        default: ""
        type: string
      confirm:
        description: "Type FAILOVER_WEB_BACKUP to confirm cutting play.tod.galaxxigames.com over to the backup machine."
        required: true
        default: ""
        type: string

concurrency:
  group: client-html5-web-backup
  cancel-in-progress: false

jobs:
  guard:
    if: ${{ inputs.invoked_via_call != true }}
    runs-on: ubuntu-24.04
    steps:
      - name: Verify confirmation
        env:
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail
          if [ "$CONFIRM" != "FAILOVER_WEB_BACKUP" ]; then
            echo "::error::Confirmation failed. Type FAILOVER_WEB_BACKUP exactly to run this workflow directly."
            exit 1
          fi

  build:
    needs: [guard]
    if: always() && (needs.guard.result == 'success' || needs.guard.result == 'skipped')
    runs-on: ubuntu-24.04

    env:
      GODOT_VERSION: "4.6.2"
      GODOT_STATUS: "stable"
      GODOT_PROJECT_PATH: "src/Client/App/corp-tower"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch private art assets
        uses: ./.github/actions/fetch-private-assets
        with:
          manifest-path: src/Client/App/corp-tower/Cor/art-manifest.json
          dest-path: src/Client/App/corp-tower/Cor/Art
          bucket: ${{ secrets.R2_BUCKET }}
          account-id: ${{ secrets.R2_ACCOUNT_ID }}
          access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          version-override: ${{ inputs.art_version_override }}

      - name: Build web export
        uses: ./.github/actions/build-godot-web
        with:
          godot-version: ${{ env.GODOT_VERSION }}
          godot-status: ${{ env.GODOT_STATUS }}
          project-path: ${{ env.GODOT_PROJECT_PATH }}
          output-dir: ${{ github.workspace }}/build/web
          preset-config: .github/godot/export_presets.web.ci.cfg

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          retention-days: 7

      - name: Remove private assets from runner
        if: always()
        run: rm -rf "$GODOT_PROJECT_PATH/Cor/Art"

  deploy-to-backup:
    needs: build
    runs-on: [self-hosted, backup]
    timeout-minutes: 15

    steps:
      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Deploy to backup machine
        run: "$HOME/corp-tower-server-backup/web-backup-up.sh"
        env:
          CORP_TOWER_WEB_BUILD_DIR: ${{ github.workspace }}/build/web
          CORP_TOWER_WEB_BUILD_SHA: ${{ github.sha }}
          CORP_TOWER_EXPECTED: ${{ inputs.expected || 'manual' }}
