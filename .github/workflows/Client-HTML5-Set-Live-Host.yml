name: Client HTML5 Set Live Host

# Picks which of the two web hosts is live and stands the other one down, as
# a matter of policy — GitHub Pages (https://play.tod.galaxxigames.com) and
# the physical backup (https://devplay.galaxxigames.com, a separate hostname
# — see decisions.md: Cloudflare's free Edge Certificate coverage only
# reaches one level of subdomain below the zone apex, and play.tod is two)
# default to only one serving players at once. Client-HTML5-Pages.yml,
# Client-HTML5-Undeploy.yml, Client-HTML5-Backup-Deploy.yml, and
# Client-HTML5-Backup-Cleanup.yml are all fully independent workflows with no
# coupling between them — either can run, or both can be live, at the same
# time. This workflow is the only place the "only one live" policy is
# enforced, by explicitly chaining the pair of calls itself:
#   target: pages   -> runs Client HTML5 Pages, then stands the backup down
#   target: backup  -> runs Client HTML5 Undeploy (soft), then deploys the backup
# All four underlying workflows remain independently dispatchable exactly as
# before, with no side effects on each other.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "pages = https://play.tod.galaxxigames.com. backup = https://devplay.galaxxigames.com."
        required: true
        type: choice
        options:
          - pages
          - backup
        default: pages
      art_version_override:
        description: "Optional art bundle version (e.g. v2) to fetch instead of the pinned manifest. Skips sha256 verification — testing only, never for release."
        required: false
        default: ""
        type: string
      confirm_backup:
        description: "Only required when target=backup (this takes GitHub Pages offline): type SWITCH_TO_BACKUP to confirm."
        required: false
        default: ""
        type: string

concurrency:
  group: client-html5-set-live-host
  cancel-in-progress: false

jobs:
  guard-backup:
    if: ${{ inputs.target == 'backup' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Verify confirmation
        env:
          CONFIRM: ${{ inputs.confirm_backup }}
        run: |
          set -euo pipefail
          if [ "$CONFIRM" != "SWITCH_TO_BACKUP" ]; then
            echo "::error::Switching to the backup takes GitHub Pages offline. Type SWITCH_TO_BACKUP in confirm_backup to proceed."
            exit 1
          fi

  to-pages:
    if: ${{ inputs.target == 'pages' }}
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/Client-HTML5-Pages.yml
    with:
      art_version_override: ${{ inputs.art_version_override }}
    secrets:
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

  stand-down-backup:
    needs: to-pages
    if: always() && needs.to-pages.result == 'success'
    uses: ./.github/workflows/Client-HTML5-Backup-Cleanup.yml
    with:
      invoked_via_call: true

  to-backup:
    needs: guard-backup
    if: ${{ inputs.target == 'backup' && needs.guard-backup.result == 'success' }}
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/Client-HTML5-Undeploy.yml
    with:
      mode: soft
      invoked_via_call: true

  deploy-backup:
    needs: to-backup
    if: always() && needs.to-backup.result == 'success'
    uses: ./.github/workflows/Client-HTML5-Backup-Deploy.yml
    with:
      art_version_override: ${{ inputs.art_version_override }}
    secrets:
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
