name: Server Update

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: server-update-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-server:
    name: Test Server On GitHub VM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: src/Server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.1"

      - name: Match EC2 npm version
        run: npm install -g npm@11.11.0

      - name: Show Node.js and npm versions
        run: |
          node --version
          npm --version

      - name: Install server dependencies
        run: npm install

      - name: Run server tests before EC2 deploy
        run: npm test

  deploy-server:
    name: Deploy Server To EC2
    runs-on: ubuntu-latest
    needs: test-server
    if: ${{ needs.test-server.result == 'success' }}
    timeout-minutes: 10
    environment: production

    steps:
      - name: Deploy over SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT || 22 }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_REPO_PATH: ${{ secrets.EC2_REPO_PATH }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "$EC2_PORT" "$EC2_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/ec2_key -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" \
            "EC2_REPO_PATH='$EC2_REPO_PATH' DEPLOY_BRANCH='$DEPLOY_BRANCH' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$EC2_REPO_PATH"
          git fetch origin "$DEPLOY_BRANCH"
          git reset --hard "origin/$DEPLOY_BRANCH"

          cd src/Server
          npm install --omit=dev
          npm test

          if command -v pm2 >/dev/null 2>&1; then
            pm2 describe corp-tower-server >/dev/null 2>&1 \
              && pm2 reload corp-tower-server --update-env \
              || pm2 start Server.js --name corp-tower-server
            pm2 save
          else
            if [ -f corp-tower-server.pid ]; then
              old_pid="$(cat corp-tower-server.pid)"
              if kill -0 "$old_pid" >/dev/null 2>&1; then
                kill "$old_pid"
                sleep 2
              fi
            fi

            nohup node Server.js > server.log 2>&1 &
            echo $! > corp-tower-server.pid
          fi
          REMOTE
