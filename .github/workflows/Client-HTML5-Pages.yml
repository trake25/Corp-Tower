name: Client HTML5 Pages

# Manual only. Deploys the web build to GitHub Pages.
# Teardown lives in Client-HTML5-Undeploy.yml.
#
# Cost note: GitHub Actions minutes are free and unlimited on public repos, and
# the R2 asset fetch sits far inside R2's permanent free tier.
# See docs/private-assets-setup.md for the cost tripwires before changing this.

on:
  workflow_dispatch:
    inputs:
      art_version_override:
        description: "Optional art bundle version (e.g. v2) to fetch instead of the pinned manifest. Skips sha256 verification — testing only, never for release."
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: client-html5-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      GODOT_VERSION: "4.6.2"
      GODOT_STATUS: "stable"
      GODOT_PROJECT_PATH: "src/Client/App/corp-tower"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # enablement: true recreates the Pages site if it was torn down by
      # Client-HTML5-Undeploy.yml, making deploy/undeploy round-trippable.
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Fetch private art assets
        uses: ./.github/actions/fetch-private-assets
        with:
          manifest-path: src/Client/App/corp-tower/Cor/art-manifest.json
          dest-path: src/Client/App/corp-tower/Cor/Art
          bucket: ${{ secrets.R2_BUCKET }}
          account-id: ${{ secrets.R2_ACCOUNT_ID }}
          access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          version-override: ${{ inputs.art_version_override }}

      - name: Build web export
        uses: ./.github/actions/build-godot-web
        with:
          godot-version: ${{ env.GODOT_VERSION }}
          godot-status: ${{ env.GODOT_STATUS }}
          project-path: ${{ env.GODOT_PROJECT_PATH }}
          output-dir: ${{ github.workspace }}/build/web
          preset-config: .github/godot/export_presets.web.ci.cfg

      - name: Disable Jekyll
        run: touch build/web/.nojekyll

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

      - name: Remove private assets from runner
        if: always()
        run: rm -rf "$GODOT_PROJECT_PATH/Cor/Art"

  deploy:
    needs: build

    runs-on: ubuntu-24.04

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
