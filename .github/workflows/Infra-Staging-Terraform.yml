name: Infra Staging Terraform

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Infrastructure slice to plan/apply."
        required: true
        default: "ec2-learning-lab"
        type: choice
        options:
          - "ec2-learning-lab"
      apply:
        description: "Apply staging infrastructure changes."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  TF_VAR_aws_region: ap-southeast-1
  TF_VAR_environment: staging
  TF_VAR_github_repository: ${{ github.repository }}
  TF_VAR_ssh_public_key: ${{ secrets.EC2_STAGING_SSH_PUBLIC_KEY }}
  TF_VAR_ssh_cidr: ${{ secrets.STAGING_SSH_CIDR || '0.0.0.0/0' }}
  TF_VAR_game_port_cidr: ${{ secrets.STAGING_GAME_PORT_CIDR || '0.0.0.0/0' }}

jobs:
  terraform:
    name: Plan Or Apply Staging Infra
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: staging
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Ensure Terraform backend bucket exists
        run: |
          set -euo pipefail
          BUCKET="corp-tower-tfstate-${AWS_REGION}"

          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Terraform backend bucket exists: $BUCKET"
          else
            aws s3api create-bucket \
              --bucket "$BUCKET" \
              --region "$AWS_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION"
          fi

          aws s3api put-bucket-versioning \
            --bucket "$BUCKET" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "$BUCKET" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket "$BUCKET" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

      - name: Terraform init
        run: terraform init -input=false -migrate-state -force-copy

      - name: Adopt existing staging resources into Terraform state
        run: |
          set -euo pipefail

          import_if_missing() {
            local address="$1"
            local id="$2"

            if [ -z "$id" ] || [ "$id" = "None" ]; then
              echo "Skip import $address: no existing AWS resource found."
              return
            fi

            if terraform state show "$address" >/dev/null 2>&1; then
              echo "Already managed: $address"
              return
            fi

            echo "Importing $address -> $id"
            terraform import -input=false "$address" "$id"
          }

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          OIDC_ARN="arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com"

          SECURITY_GROUP_ID="$(
            aws ec2 describe-security-groups \
              --filters \
                "Name=group-name,Values=corp-tower-staging" \
                "Name=vpc-id,Values=$(aws ec2 describe-vpcs --filters 'Name=is-default,Values=true' --query 'Vpcs[0].VpcId' --output text)" \
              --query 'SecurityGroups[0].GroupId' \
              --output text 2>/dev/null || true
          )"

          GATEWAY_INSTANCE_ID="$(
            aws ec2 describe-instances \
              --filters \
                "Name=tag:Project,Values=corp-tower" \
                "Name=tag:Environment,Values=staging" \
                "Name=tag:Name,Values=corp-tower-staging,corp-tower-staging-gateway" \
                "Name=instance-state-name,Values=pending,running,stopping,stopped" \
              --query 'Reservations[0].Instances[0].InstanceId' \
              --output text 2>/dev/null || true
          )"

          import_if_missing aws_key_pair.staging corp-tower-staging
          import_if_missing aws_security_group.staging "$SECURITY_GROUP_ID"
          import_if_missing aws_iam_role.ec2 corp-tower-staging-ec2
          import_if_missing aws_iam_instance_profile.ec2 corp-tower-staging-ec2
          import_if_missing aws_iam_role_policy.ec2_ecr_pull corp-tower-staging-ec2:ecr-pull
          import_if_missing aws_ecr_repository.server corp-tower-server-staging
          import_if_missing aws_ecr_lifecycle_policy.server corp-tower-server-staging
          import_if_missing aws_iam_openid_connect_provider.github "$OIDC_ARN"
          import_if_missing aws_iam_role.github_actions corp-tower-staging-github-actions
          import_if_missing aws_iam_role_policy.github_ecr_push corp-tower-staging-github-actions:ecr-push
          import_if_missing aws_instance.staging "$GATEWAY_INSTANCE_ID"

      - name: Terraform fmt check
        run: terraform fmt -check

      - name: Terraform validate
        run: terraform validate

      - name: Select Terraform target
        run: |
          set -euo pipefail
          TARGET="${{ inputs.target }}"

          case "$TARGET" in
            ec2-learning-lab)
              echo "TF_TARGET_ARGS=-target=aws_instance.staging -target=aws_instance.worker" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Disabled target '$TARGET'. Only EC2 learning lab is enabled for cost-safe staging."
              exit 1
              ;;
          esac

          if [ "${{ inputs.apply }}" != "true" ]; then
            echo "This run is PLAN ONLY. It will not create EC2 workers."
          else
            echo "This run will APPLY infrastructure changes."
          fi

      - name: Terraform plan
        run: terraform plan -input=false $TF_TARGET_ARGS

      - name: Terraform apply
        if: ${{ inputs.apply == 'true' }}
        run: terraform apply -input=false -auto-approve $TF_TARGET_ARGS

      - name: Show Terraform outputs
        if: ${{ inputs.apply == 'true' }}
        run: terraform output

      - name: Verify EC2 learning lab instances
        if: ${{ inputs.apply == 'true' }}
        run: |
          set -euo pipefail

          GATEWAY_COUNT="$(
            aws ec2 describe-instances \
              --filters \
                "Name=tag:Project,Values=corp-tower" \
                "Name=tag:Environment,Values=staging" \
                "Name=tag:Role,Values=gateway-redis-proxy-k3s-learning" \
                "Name=instance-state-name,Values=pending,running,stopping,stopped" \
              --query 'length(Reservations[].Instances[])' \
              --output text
          )"

          WORKER_COUNT="$(
            aws ec2 describe-instances \
              --filters \
                "Name=tag:Project,Values=corp-tower" \
                "Name=tag:Environment,Values=staging" \
                "Name=tag:Role,Values=docker-server-worker" \
                "Name=instance-state-name,Values=pending,running,stopping,stopped" \
              --query 'length(Reservations[].Instances[])' \
              --output text
          )"

          echo "Gateway instances: $GATEWAY_COUNT"
          echo "Worker instances: $WORKER_COUNT"

          if [ "$GATEWAY_COUNT" -lt 1 ] || [ "$WORKER_COUNT" -lt 2 ]; then
            echo "Expected at least 1 gateway and 2 workers."
            exit 1
          fi
