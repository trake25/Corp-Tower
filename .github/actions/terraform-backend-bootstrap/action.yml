name: Terraform Backend Bootstrap
description: >-
  Ensure the shared Terraform S3 state bucket (corp-tower-tfstate-<region>)
  exists with versioning, encryption, and public access blocked. Idempotent.

inputs:
  aws-region:
    description: AWS region the state bucket lives in.
    required: true

runs:
  using: composite
  steps:
    - name: Ensure Terraform backend bucket exists
      shell: bash
      env:
        AWS_REGION: ${{ inputs.aws-region }}
      run: |
        set -euo pipefail
        BUCKET="corp-tower-tfstate-${AWS_REGION}"

        if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
          echo "Terraform backend bucket exists: $BUCKET"
        else
          aws s3api create-bucket \
            --bucket "$BUCKET" \
            --region "$AWS_REGION" \
            --create-bucket-configuration LocationConstraint="$AWS_REGION"
        fi

        aws s3api put-bucket-versioning \
          --bucket "$BUCKET" \
          --versioning-configuration Status=Enabled

        aws s3api put-bucket-encryption \
          --bucket "$BUCKET" \
          --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

        aws s3api put-public-access-block \
          --bucket "$BUCKET" \
          --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
